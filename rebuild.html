      <input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>u('imgRef',ev.target.result);r.readAsDataURL(f);}}}/>
      {d.imgRef&&<div style={{marginTop:6}}><img src={d.imgRef} style={{maxWidth:'100%',maxHeight:300,borderRadius:6,border:'1px solid #ddd'}}/><br/><button className="bn-sm bn-rm" style={{marginTop:4}} onClick={()=>u('imgRef',null)}>Rimuovi immagine</button></div>}
    </div>
  </div>

  {/* RIEPILOGO */}
  <div className="cd" style={{borderLeft:'4px solid var(--gn)'}}>
    <h2>Riepilogo idraulico</h2>
    <div className="rw">
      <div className="ls"><h4>Geometria</h4><div className="dl">Sup: <b>{sup.toFixed(1)} m²</b></div><div className="dl">Perim: <b>{perim.toFixed(1)} m</b></div>
        <div className="dl">Volume base (L×W×prof): <b>{volBase.toFixed(1)} m³</b></div>
        {volExtra!==0&&<div className="dl">Volume extra (elem.+corr.): <b style={{color:volExtra>=0?'var(--gn)':'var(--rd)'}}>{volExtra>=0?'+':''}{volExtra.toFixed(1)} m³</b></div>}
        <div className="dl"><b>Volume TOTALE: {volTot.toFixed(1)} m³</b></div></div>
      <div className="ls"><h4>Portata</h4>
        {d.tipoPisc==='Domestica'&&<div className="dl">T ricircolo: <b>{pr.T}h</b> <span className="hn">Tempo di ricircolo totale del volume vasca. Scelta Acqualab (UNI EN 16713-2 ammette fino a 8h)</span></div>}
        <div className="dl">Q circ: <b>{Q.toFixed(1)} m³/h</b></div>
        {qG>0&&<div className="dl">Q giochi: <b>+{qG.toFixed(1)}</b></div>}
        <div className="dl"><b>Q TOTALE: <span className="tc">{Qtot.toFixed(1)} m³/h</span></b></div>
        <div style={{fontSize:'.6rem',color:'var(--bl)',marginTop:2}}>{pr.note}</div></div>
      <div className="ls"><h4>Ripartizione ASPIRAZIONE</h4>
        <div className="dl">Superficie ({d.circ==='skimmer'?'skimmer':'sfioro'}): <b>{rip.pSup.toFixed(0)}% = {rip.qSup.toFixed(1)} m³/h</b></div>
        <div className="dl">Fondo (prese fondo): <b>{rip.pFondo.toFixed(0)}% = {rip.qFondo.toFixed(1)} m³/h</b></div>
        <div style={{fontSize:'.58rem',color:'#999'}}>{rip.note}</div>
        <div style={{fontSize:'.56rem',color:'var(--bl)',marginTop:2,fontStyle:'italic'}}>Ripartizione = ASPIRAZIONE. Mandata tramite {d.circ==='skimmer'?'bocchette a parete.':'bocchette parete/pavimento.'}</div></div>
    </div>
    {d.tipoPisc==='Tipo 2'&&zone.length>0&&<div style={{marginTop:6}}><h3>Zone Prospetto 3 — UNI 10637:2024</h3>
      <table className="t"><thead><tr><th>Zona</th><th>Prof.</th><th>T h</th><th>Vol m³</th><th>Q m³/h</th></tr></thead><tbody>
        {zone.map(z=><tr key={z.z}><td><span className={'zt '+z.cl}>{z.z}</span> {z.desc}</td><td>{z.desc}</td><td>{z.ore}</td><td>{z.vol.toFixed(1)}</td><td>{(z.vol/z.ore).toFixed(1)}</td></tr>)}
        <tr className="tt"><td colSpan="3"><b>Totale</b></td><td><b>{volTot.toFixed(1)}</b></td><td><b>{Q.toFixed(1)}</b></td></tr>
      </tbody></table></div>}
    {pr.Vc&&<div style={{marginTop:6}}><h3>Vasca di compenso {d.tipoPisc==='Tipo 2'?'(UNI 10637:2024)':'(rif. UNI 10637:2024)'}</h3>
      <div style={{fontSize:'.62rem',color:'var(--bl)',marginBottom:4,padding:6,background:'#eaf2fa',borderRadius:4}}>
        La vasca di compenso ha due zone: il <b>volume d'acqua</b> (60% — dal fondo al livello operativo) e lo <b>spazio vuoto</b> (40% — dal livello operativo al troppo pieno). Lo spazio vuoto deve contenere l'acqua spostata dai bagnanti, il moto ondoso e l'acqua in canaletta.
      </div>
      <table className="t"><thead><tr><th>Componente</th><th>m³</th><th>Note</th></tr></thead><tbody>
        <tr><td colSpan="3" style={{background:'#fff3cd',fontWeight:700,fontSize:'.68rem'}}>SPAZIO VUOTO (40%) — dal livello operativo al troppo pieno</td></tr>
        <tr><td>V bagnanti ({pr.Vc.nBag} pers. × 70 l)</td><td className="r">{pr.Vc.vBag}</td><td style={{fontSize:'.6rem'}}>Sup ÷ {d.tipoPisc==='Tipo 2'?'3':'4'} m²/pers</td></tr>
        <tr><td>V moto ondoso ({pr.Vc.nBag} pers. × 35 l)</td><td className="r">{pr.Vc.vOnde}</td><td style={{fontSize:'.6rem'}}>50% del volume spostato</td></tr>
        <tr><td>V acqua in transito canaletta</td><td className="r">{pr.Vc.vCanal}</td><td style={{fontSize:'.6rem'}}>Stima: perim. × sez. canaletta</td></tr>
        {pr.Vc.giochiOnde&&<tr style={{background:'#fef9e7'}}><td>V moto ondoso giochi d'acqua (+30%)</td><td className="r">{pr.Vc.vGiochiOnde}</td><td style={{fontSize:'.6rem'}}>Cascate, lame, geyser</td></tr>}
        <tr style={{background:'#fff3cd'}}><td><b>Totale spazio vuoto necessario</b></td><td className="r"><b>{pr.Vc.vLibero}</b></td><td style={{fontSize:'.6rem'}}>Somma voci{pr.Vc.giochiOnde?' (con +30% giochi)':''}</td></tr>
        {pr.Vc.vContro>0&&<tr><td colSpan="3" style={{background:'#eaf2fa',fontWeight:700,fontSize:'.68rem'}}>VINCOLO CONTROLAVAGGIO</td></tr>}
        {pr.Vc.vContro>0&&<tr><td>V acqua per controlavaggio (1 filtro)</td><td className="r">{pr.Vc.vContro}</td><td style={{fontSize:'.6rem'}}>Q × {d.tipoPisc==='Tipo 2'?'5':'3'} min — continuità con 1 filtro in lavaggio</td></tr>}
        <tr className="tt"><td><b>VOLUME GEOMETRICO MINIMO VASCA</b></td><td className="r"><b>{pr.Vc.vTotMin} m³</b></td><td style={{fontSize:'.6rem'}}>L × W × H da costruire (vincolo: {pr.Vc.vincolo})</td></tr>
        <tr style={{background:'#eafaf1'}}><td><b>di cui ACQUA (60%)</b></td><td className="r"><b className="tc">{pr.Vc.vUtile} m³</b></td><td style={{fontSize:'.6rem'}}>Dal fondo al livello operativo — sommato al vol. vasca per calcolo Q</td></tr>
        <tr style={{background:'#fff3cd'}}><td><b>di cui VUOTO (40%)</b></td><td className="r"><b>{(pr.Vc.vTotMin*0.4).toFixed(1)} m³</b></td><td style={{fontSize:'.6rem'}}>Dal livello operativo al troppo pieno</td></tr>
      </tbody></table>
      <div style={{fontSize:'.6rem',color:'var(--bl)',marginTop:3}}>V acqua compenso ({pr.Vc.vUtile} m³) già incluso nel calcolo della portata: V vasca {volTot.toFixed(1)} + V acqua compenso {pr.Vc.vUtile} = <b>{pr.volTotConComp||'—'} m³</b> totali da ricircolare.</div>
    </div>}
  </div>


  {d.L<=0&&<div className="wr">Lunghezza deve essere {'>'} 0</div>}
  {d.W<=0&&<div className="wr">Larghezza deve essere {'>'} 0</div>}
  {d.seg.some(s=>s.da<0||s.a<0)&&<div className="wr">Profondità non può essere negativa</div>}
  {d.seg.some(s=>s.da===0&&s.a===0)&&<div className="wr">Profondità non può essere zero</div>}
  <button className="bn bn-go" onClick={go} disabled={!d.cliente||!percOk||skErr||d.L<=0||d.W<=0||d.seg.some(s=>s.da<0||s.a<0||(s.da===0&&s.a===0))}>{!d.cliente?'Inserire cliente':!percOk?'Σ ≠ 100%':skErr?'Sfioro obbligatorio':d.L<=0||d.W<=0?'Dimensioni non valide':'Avanti → 2. Impianto'}</button>
  </F>);
}

// =====================================================================
// FASE 2 — SELEZIONE IMPIANTO
// App propone automaticamente pompa, filtro, accessori, componenti.
// Utente può modificare. Alert bloccante se non conforme.
// =====================================================================
function Fase2Impianto({d,u,Qtot,rip,sup,perim,volTot,dc,pr,go,bk}){
  const hAcc=(d.acc&&d.acc.ris?PLC.ris:0)+(d.acc&&d.acc.ele?PLC.ele:0)+(d.acc&&d.acc.dos?PLC.dos:0)+(d.acc&&d.acc.uv?PLC.uv:0);
  const Tbase=pr.T||d.tRic||5;
  const nPompeCalc=d.tipoPisc==='Tipo 2'?2:1;
  const supCirc=sup;
  const volCalc=volTot;

  // Stima H provvisoria per selezione pompa (senza tratti reali)
  const hStima=useMemo(()=>{
    try{return calcHcircuito(Qtot,d.tipoPisc,d.circ,d.tt||d.tipoTubo,d.tipoFiltro,sup,d.tl,d.tr,d.qt,hAcc);}
    catch(e){return 7.5;}
  },[Qtot,d.tipoPisc,d.circ,d.tt,d.tipoTubo,d.tipoFiltro,sup,d.tl,d.tr,d.qt,hAcc]);

  // Selezione automatica pompa+filtro
  const autoSel=useMemo(()=>{
    try{return autoSelFP(Qtot,d.tipoPisc,d.tipoFiltro,supCirc,nPompeCalc,hStima);}
    catch(e){return null;}
  },[Qtot,d.tipoPisc,d.tipoFiltro,supCirc,nPompeCalc,hStima]);

  // Pompa e filtro selezionati (auto o manual)
  const [manualPumpKey,setManualPumpKey]=useState(d.selImpianto&&d.selImpianto.pumpKey||null);
  const [manualFiltroKey,setManualFiltroKey]=useState(d.selImpianto&&d.selImpianto.filtroKey||null);

  const sP=useMemo(()=>{
    if(!manualPumpKey) return autoSel&&autoSel.pompa;
    const all=Object.entries(C_PM).reduce((acc,[forn,pumps])=>{pumps.forEach(p=>acc.push({...p,forn}));return acc;},[]);
    return all.find(p=>p.forn+':'+p.c===manualPumpKey)||autoSel&&autoSel.pompa;
  },[manualPumpKey,autoSel]);

  const sF=useMemo(()=>{
    if(!manualFiltroKey) return autoSel&&autoSel.filtro;
    const parts=manualFiltroKey.split(':');
    const forn=parts[0],cod=parts[1],nf=+parts[2];
    const all=selFiltri(Qtot,d.tipoPisc,d.tipoFiltro);
    return all.find(f=>f.forn===forn&&f.c===cod&&f.nf===nf)||autoSel&&autoSel.filtro;
  },[manualFiltroKey,autoSel,Qtot,d.tipoPisc,d.tipoFiltro]);

  // Calcolo Q max pompa a filtro pulito (appena lavato) con H stimata
  const Qmax=useMemo(()=>{
    if(!sP) return Qtot;
    const isC=d.tipoFiltro==='cartuccia';
    const hFP=isC?PR.HF_C0:PR.HF_S0, hFS=isC?PR.HF_C:PR.HF_S;
    // Calcolo iterativo Qmax per intersezione curva pompa / curva impianto (filtro pulito (appena lavato))
    var Qm=+pumpQatH(sP,Math.max(0,hStima-hFS+hFP)).toFixed(1);
    for(var i=0;i<6;i++){
      var hC=calcHcircuito(Qm,d.tipoPisc,d.circ,d.tt||d.tipoTubo,d.tipoFiltro,sup,d.tl,d.tr,d.qt,hAcc);
      var hPul2=Math.max(0,hC-hFS+hFP);
      var Qnew=+pumpQatH(sP,hPul2).toFixed(2);
      if(Math.abs(Qnew-Qm)<0.05) break;
      Qm=Qnew;
    }
    return +Qm.toFixed(1);
  },[sP,hStima,d.tipoFiltro,d.tipoPisc,d.circ,d.tt,d.tipoTubo,sup,d.tl,d.tr,d.qt,hAcc]);

  const Qmin=useMemo(()=>{
    if(!sP) return 0;
    const hFS=d.tipoFiltro==='cartuccia'?PR.HF_C:PR.HF_S;
    // Calcolo iterativo Qmin per intersezione curva pompa / curva impianto (filtro sporco)
    var Qr=+pumpQatH(sP,Math.max(0,hStima)).toFixed(1);
    for(var i=0;i<6;i++){
      var hSp=calcHcircuito(Qr,d.tipoPisc,d.circ,d.tt||d.tipoTubo,d.tipoFiltro,sup,d.tl,d.tr,d.qt,hAcc);
      var Qnew=+pumpQatH(sP,Math.max(0,hSp)).toFixed(2);
      if(Math.abs(Qnew-Qr)<0.05) break;
      Qr=Qnew;
    }
    return +Qr.toFixed(1);
  },[sP,hStima,d.tipoFiltro,d.tipoPisc,d.circ,d.tt,d.tipoTubo,sup,d.tl,d.tr,d.qt,hAcc]);
  const Teff=Qmin>0?+(volCalc/Qmin).toFixed(1):null;

  // Ricalcola dc con Qmax reale della pompa selezionata
  const dcLocal=useMemo(()=>{
    if(!Qmax||Qmax<=0)return dc;
    try{return dimCirc(Qtot,rip.qSup,rip.qFondo,d.circ,d.tipoPisc,d.tt||d.tipoTubo,d.tipoSfioro,sup,d.costruz,d.noPF,d.ovNSki,d.ovNBocc,d.ovNPF,d.ovDSki,d.ovDPF,d.ovDBocc,Qmax,d.ovDC1,d.ovDC2,d.ovDC3,Qmax&&auto.qMin?+(Qmax+auto.qMin)/2:undefined);}
    catch(e){return dc;}
  },[Qmax,Qtot,rip.qSup,rip.qFondo,d.circ,d.tipoPisc,d.tt,d.tipoTubo,d.tipoSfioro,sup,d.costruz,d.noPF,d.ovNSki,d.ovNBocc,d.ovNPF,d.ovDSki,d.ovDPF,d.ovDBocc]);

  // Componenti auto (usa dcLocal con Qmax reale + override collettori)
  const dcLocalEff=useMemo(()=>{
    if(!dcLocal)return dc;
    try{return applyCollOv(dcLocal,d.ovCa,d.ovCm,Qtot,(d.tt&&d.tt.C)||d.tipoTubo,d.tipoPisc);}
    catch(e){return dcLocal;}
  },[dcLocal,d.ovCa,d.ovCm,Qtot,d.tt,d.tipoTubo,d.tipoPisc]);
  const nSki=dcLocalEff.ski?dcLocalEff.ski.n:0;
  const nPF=dcLocalEff.pf?dcLocalEff.pf.n:0;
  const nBocc=dcLocalEff.bocc?dcLocalEff.bocc.n:0;
  const collAsp=dcLocalEff.collAsp?dcLocalEff.collAsp.dn.dn:'—';
  const collMan=dcLocalEff.collMan?dcLocalEff.collMan.dn.dn:'—';

  // Verifica conformità
  const alerts=[];const warns=[];
  if(!sP) alerts.push('⛔ Nessuna pompa compatibile trovata');
  if(!sF) alerts.push('⛔ Nessun filtro compatibile trovato');
  if(Teff&&Teff>Tbase) alerts.push('⛔ T ricircolo stimato '+Teff+'h > '+Tbase+'h richiesto — scegliere una pompa più potente');
  else if(Teff&&Teff>Tbase-0.3) warns.push('⚠ T ricircolo stimato '+Teff+'h vicino al limite '+Tbase+'h');
  if(sF&&Qmax>sF.qrFiltro) alerts.push('⛔ Q max pompa '+Qmax+' m³/h > Q max filtro '+sF.qrFiltro+' m³/h');
  if(d.tipoPisc==='Tipo 2'&&!d.acc.dos) alerts.push('⛔ Dosaggio automatico OBBLIGATORIO per Tipo 2 (UNI 10637:2024)');
  // Verifica portata max skimmer
  if(d.circ==='skimmer'&&nSki>0&&sP){
    const skiSel=d.manualSkiKey?filtraSki(d.costruz).find(s=>s.c===d.manualSkiKey):dcLocalEff.ski&&filtraSki(d.costruz).find(s=>s.c===(dcLocalEff.ski.c||'56176'));
    const qRacSki=skiSel?skiSel.q:7.5;
    const qPerSki=(dcLocalEff.ski&&dcLocalEff.ski.qEa)||( Qtot*2/3/nSki);
    if(qPerSki>qRacSki) warns.push('⚠ Q per skimmer (esercizio) = '+qPerSki.toFixed(1)+' m³/h > Q raccomandata '+qRacSki+' m³/h — verificare con costruttore o aumentare il numero di skimmer');
  }

  const canProceed=alerts.length===0&&sP&&sF;
  const hasAlert=alerts.length>0;
  const hasWarn=!hasAlert&&warns.length>0;
  const alertBg=hasAlert?'#fde8e8':hasWarn?'#fff8e1':'#e8f8f0';
  const alertBrd=hasAlert?'#e74c3c':hasWarn?'#f39c12':'#27ae60';
  const alertColor=hasAlert?'#c0392b':hasWarn?'#d68910':'#1e8449';
  const alertTitle=hasAlert?'⛔ Non conforme — correggere prima di procedere':hasWarn?'⚠ Attenzione — verifiche da considerare':'✓ Configurazione conforme — nessuna anomalia';

  // ── INDICE DI CONFORMITÀ TECNICA (ICT) ──
  const ict=useMemo(()=>{
    if(!sP||!sF||!dcLocalEff) return null;
    const cats=[];

    // SICUREZZA ASPIRAZIONI (30%)
    // Norma: N≥2 PF in parallelo + Q/(N-1) ≤ Q max griglia (UNI EN 16582)
    const nPFn=dcLocalEff.pf?dcLocalEff.pf.n:0;
    const qGriglia=dcLocalEff.pf?dcLocalEff.pf.qMaxGriglia:15;
    let s1,note1;
    if(nPFn<2){
      s1=0; note1='ERRORE: N prese fondo < 2 (obbligatorio)';
    } else {
      const qPerPresa=Qmax/(nPFn-1);
      if(qPerPresa>qGriglia){
        s1=0; note1='NON CONFORME: Q/(N-1)='+qPerPresa.toFixed(1)+' > '+qGriglia+' m³/h';
      } else {
        s1=100; note1='Q/(N-1)='+qPerPresa.toFixed(1)+' m³/h ≤ '+qGriglia+' m³/h ✓';
      }
    }
    cats.push({label:'Sicurezza aspirazioni',w:30,score:s1,note:note1});

    // IDRAULICA (25%)
    // Norma: tutti i tratti con v ≤ limite e J ≤ limite (Hazen-Williams)
    const colAspOk=dcLocalEff.collAsp&&dcLocalEff.collAsp.dn.ok;
    const colManOk=dcLocalEff.collMan&&dcLocalEff.collMan.dn.ok;
    const skiRamoOk=dcLocalEff.ski?dcLocalEff.ski.dnRamo.ok:true;
    const boccRamoOk=dcLocalEff.bocc?dcLocalEff.bocc.dnRamo.ok:true;
    const pfRamoOk=dcLocalEff.pf?dcLocalEff.pf.dnLinea.ok:true;
    const trC1ok=dcLocalEff.trC1?dcLocalEff.trC1.ok:true;
    const trC2ok=dcLocalEff.trC2?dcLocalEff.trC2.ok:true;
    const trC3ok=dcLocalEff.trC3?dcLocalEff.trC3.ok:true;
    const allOkHyd=colAspOk&&colManOk&&skiRamoOk&&boccRamoOk&&pfRamoOk&&trC1ok&&trC2ok&&trC3ok;
    const nFail=[colAspOk,colManOk,skiRamoOk,boccRamoOk,pfRamoOk,trC1ok,trC2ok,trC3ok].filter(x=>!x).length;
    const s2=allOkHyd?100:Math.max(0,100-nFail*20);
    const note2=allOkHyd?'Tutti i tratti conformi (v e J nei limiti) ✓':nFail+' tratto/i fuori norma';
    cats.push({label:'Idraulica tubazioni',w:25,score:s2,note:note2});

    // FILTRAZIONE (25%)
    // Norma: T eff ≤ T richiesto + Q max pompa ≤ Q max filtro dichiarato
    let s3,note3;
    if(Teff>Tbase){
      s3=0; note3='NON CONFORME: T='+Teff+'h > '+Tbase+'h richiesto';
    } else if(Qmax>sF.qrFiltro){
      s3=0; note3='NON CONFORME: Q max pompa '+Qmax+' > Q max filtro '+sF.qrFiltro+' m³/h';
    } else {
      s3=100; note3='T='+Teff+'h ≤ '+Tbase+'h ✓ · Q pompa '+Qmax+' ≤ '+sF.qrFiltro+' m³/h ✓';
    }
    cats.push({label:'Filtrazione',w:25,score:s3,note:note3});

    // COMPONENTI (20%)
    // Norma: Q/bocchetta ≤ Q max dichiarato (limite prodotto)
    // Warning (non normativo): Q/skimmer > Q raccomandata costruttore
    const qPerBoc=dcLocalEff.bocc?Qmax/dcLocalEff.bocc.n:0;
    const boccOk=qPerBoc<=PR.Q_MAX_BOCC;
    let skiWarn=false;
    if(d.circ==='skimmer'&&dcLocalEff.ski){
      const skiSel2=d.manualSkiKey?filtraSki(d.costruz).find(s=>s.c===d.manualSkiKey):filtraSki(d.costruz).find(s=>s.c===(dcLocalEff.ski.c||'56176'));
      const qRac=skiSel2?skiSel2.q:7.5;
      skiWarn=(dcLocalEff.ski.qEa||0)>qRac;
    }
    // bocchetta: limite normativo del prodotto → penalità piena se superato
    // skimmer: portata raccomandata (non normativa) → penalità ridotta (warning)
    const s4=!boccOk?0:skiWarn?85:100;
    const note4=!boccOk?'NON CONFORME: Q bocchetta '+qPerBoc.toFixed(1)+' > '+PR.Q_MAX_BOCC+' m³/h':
      skiWarn?'Bocchette ✓ · Skimmer sopra portata raccomandata (warning)':
      'Bocchette ✓ · Skimmer ✓';
    cats.push({label:'Componenti',w:20,score:s4,note:note4});

    // ICT ponderato
    const ict=Math.round(cats.reduce((sum,c)=>sum+c.score*c.w/100,0));
    const cls=ict>=90?'A':ict>=75?'B':ict>=60?'C':ict>=40?'D':'E';
    const clsColor=ict>=90?'#1a7a3c':ict>=75?'#2e86c1':ict>=60?'#d68910':ict>=40?'#e67e22':'#c0392b';
    return{ict,cls,clsColor,cats};
  },[sP,sF,dcLocalEff,Qmax,Teff,Tbase,volTot,d.tipoPisc,d.circ,d.manualSkiKey]);

  function handleGo(){
    const _nBocc=dcLocalEff&&dcLocalEff.bocc?dcLocalEff.bocc.n:null;
    const _collManDN=dcLocalEff&&dcLocalEff.collMan?dcLocalEff.collMan.dn.dn:null;
    const _collAspDN=dcLocalEff&&dcLocalEff.collAsp?dcLocalEff.collAsp.dn.dn:null;
    u('selImpianto',{pumpKey:manualPumpKey,filtroKey:manualFiltroKey,Qmax,Qmin,Teff,hStima,
      nBoccEff:_nBocc,collManDN:_collManDN,collAspDN:_collAspDN,
      ict:ict?ict.ict:null,ictCls:ict?ict.cls:null});
    go();
  }

  return(<F>
  <div className="cd"><h2>Fase 2 — Selezione impianto</h2>
    <div style={{fontSize:'.72rem',color:'#888',marginBottom:8}}>
      L'app propone la configurazione ottimale. Puoi modificare ogni elemento. Controlla l'alert prima di procedere.
    </div>

    {/* SELEZIONE POMPA + FILTRO */}
    <div className="cd" style={{borderLeft:'4px solid #8e44ad',marginBottom:8}}>
      <div style={{fontWeight:700,fontSize:'.8rem',color:'#6c3483',marginBottom:8}}>Pompa e filtro</div>
      <div className="rw" style={{gap:8}}>
        <div style={{flex:'1 1 160px'}}>
          <label style={{fontSize:'.64rem',color:'#555',display:'block',marginBottom:2}}>
            Pompa <span style={{color:'#888',fontWeight:400}}>(auto: {autoSel&&autoSel.pompa?autoSel.pompa.m+' '+autoSel.pompa.hp+'HP':'—'})</span>
          </label>
          <select value={manualPumpKey||''} onChange={e=>{setManualPumpKey(e.target.value||null);}}
            style={{width:'100%',fontSize:'.7rem',padding:'5px 4px',border:'1.5px solid #8e44ad',borderRadius:5,background:'#f5eef8'}}>
            <option value=''>Auto — {autoSel&&autoSel.pompa?autoSel.pompa.m+' '+autoSel.pompa.hp+'HP':'—'}</option>
            {Object.entries(C_PM).reduce((acc,[forn,pumps])=>{pumps.forEach(p=>acc.push({...p,forn}));return acc;},[])
              .map((p,i)=><option key={i} value={p.forn+':'+p.c}>{p.m} {p.hp}HP ({p.forn})</option>)}
          </select>
        </div>
        <div style={{flex:'1 1 160px'}}>
          <label style={{fontSize:'.64rem',color:'#555',display:'block',marginBottom:2}}>
            Filtro <span style={{color:'#888',fontWeight:400}}>(auto: {autoSel&&autoSel.filtro?autoSel.filtro.m:'—'})</span>
          </label>
          <select value={manualFiltroKey||''} onChange={e=>{setManualFiltroKey(e.target.value||null);}}
            style={{width:'100%',fontSize:'.7rem',padding:'5px 4px',border:'1.5px solid #16a085',borderRadius:5,background:'#e8f8f5'}}>
            <option value=''>Auto — {autoSel&&autoSel.filtro?autoSel.filtro.m:'—'}</option>
            {selFiltri(Qtot,d.tipoPisc,d.tipoFiltro).map((f,i)=><option key={i} value={f.forn+':'+f.c+':'+f.nf}>{f.nf}x {f.m} ({f.forn})</option>)}
          </select>
        </div>
      </div>
      {(manualPumpKey||manualFiltroKey)&&<button className="bn-sm" style={{marginTop:6,background:'#fadbd8',color:'#922b21',borderColor:'#e74c3c'}}
        onClick={()=>{setManualPumpKey(null);setManualFiltroKey(null);}}>✕ Ripristina automatico</button>}
    </div>

    {/* SELEZIONE ACCESSORI IN LINEA */}
    <div className="cd" style={{borderLeft:'4px solid #1A5057',marginBottom:8}}>
      <div style={{fontWeight:700,fontSize:'.8rem',color:'#1A5057',marginBottom:4}}>Accessori in linea <span style={{fontWeight:400,fontSize:'.7rem',color:'#888'}}>(perdite di carico aggiuntive sulla prevalenza)</span></div>
      <div style={{fontSize:'.68rem',color:'var(--bl)',marginBottom:8,padding:'6px 10px',background:'#eaf2fa',borderRadius:6}}>
        Ogni accessorio installato in linea aggiunge una perdita di carico alla prevalenza totale. Selezionare solo gli accessori effettivamente presenti nell'impianto.
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer',padding:'8px 10px',background:d.acc.ele?'#d0e9ec':'#f9f9f9',borderRadius:6,border:'1.5px solid '+(d.acc.ele?'#1A5057':'var(--c3)'),transition:'all .15s'}}>
          <input type="checkbox" checked={d.acc.ele} onChange={e=>un('acc','ele',e.target.checked)} style={{width:18,height:18,accentColor:'#1A5057',flexShrink:0,marginTop:2}}/>
          <div>
            <div style={{fontWeight:700,fontSize:'.76rem',color:'#1A5057'}}>Elettrolisi sale a bassa salinità</div>
            <div style={{fontSize:'.68rem',color:'#555',marginTop:1}}>Salinità 1,5 kg/m³ · 30 g/h Cl₂ · regolazione pH automatica</div>
            <div style={{fontSize:'.68rem',color:'#555',marginTop:1}}>Cella su <b>by-pass</b>: tee → VS → curva 90° → cella → VS → tee.</div>
            <div style={{fontSize:'.68rem',color:'#555',marginTop:1}}>Sul circuito principale: solo i 2 tee derivazione. VS e curve sul ramo by-pass.</div>
            <div style={{fontSize:'.68rem',color:'var(--rd)',fontWeight:700,marginTop:1}}>+{PLC.ele} mca (2 tee deriv. sul circuito principale)</div>
          </div>
        </label>
        <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer',padding:'8px 10px',background:d.acc.ris?'#d0e9ec':'#f9f9f9',borderRadius:6,border:'1.5px solid '+(d.acc.ris?'#1A5057':'var(--c3)'),transition:'all .15s'}}>
          <input type="checkbox" checked={d.acc.ris} onChange={e=>un('acc','ris',e.target.checked)} style={{width:18,height:18,accentColor:'#1A5057',flexShrink:0,marginTop:2}}/>
          <div>
            <div style={{fontWeight:700,fontSize:'.76rem',color:'#1A5057'}}>Riscaldamento (pompa di calore)</div>
            <div style={{fontSize:'.68rem',color:'#555',marginTop:1}}>Scambiatore in linea sul circuito principale</div>
            <div style={{fontSize:'.68rem',color:'var(--rd)',fontWeight:700,marginTop:1}}>+{PLC.ris} mca sulla prevalenza</div>
          </div>
        </label>
        <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer',padding:'8px 10px',background:d.acc.dos?'#d0e9ec':'#f9f9f9',borderRadius:6,border:'1.5px solid '+(d.acc.dos?'#1A5057':'var(--c3)'),transition:'all .15s'}}>
          <input type="checkbox" checked={d.acc.dos} onChange={e=>un('acc','dos',e.target.checked)} style={{width:18,height:18,accentColor:'#1A5057',flexShrink:0,marginTop:2}}/>
          <div>
            <div style={{fontWeight:700,fontSize:'.76rem',color:'#1A5057'}}>Dosaggio automatico cloro/pH {d.tipoPisc==='Tipo 2'&&<span style={{color:'var(--rd)',fontWeight:700}}> — OBBLIGATORIO Tipo 2</span>}</div>
            <div style={{fontSize:'.68rem',color:'#555',marginTop:1}}>Centralina dosaggio con sonde in linea</div>
            <div style={{fontSize:'.68rem',color:'var(--rd)',fontWeight:700,marginTop:1}}>+{PLC.dos} mca sulla prevalenza</div>
          </div>
        </label>
        <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer',padding:'8px 10px',background:d.acc.uv?'#d0e9ec':'#f9f9f9',borderRadius:6,border:'1.5px solid '+(d.acc.uv?'#1A5057':'var(--c3)'),transition:'all .15s'}}>
          <input type="checkbox" checked={d.acc.uv} onChange={e=>un('acc','uv',e.target.checked)} style={{width:18,height:18,accentColor:'#1A5057',flexShrink:0,marginTop:2}}/>
          <div>
            <div style={{fontWeight:700,fontSize:'.76rem',color:'#1A5057'}}>Sterilizzazione UV</div>
            <div style={{fontSize:'.68rem',color:'#555',marginTop:1}}>Reattore UV in linea sul circuito di mandata</div>
            <div style={{fontSize:'.68rem',color:'var(--rd)',fontWeight:700,marginTop:1}}>+{PLC.uv} mca sulla prevalenza</div>
          </div>
        </label>
      </div>
      {hAcc>0&&<div style={{marginTop:8,padding:'8px 10px',background:'#fff3cd',borderRadius:6,border:'1px solid #f0c040',fontSize:'.74rem',fontWeight:700,color:'#856404'}}>
        ∑ perdite accessori selezionati: +{hAcc.toFixed(2)} mca · H progetto aggiornata: {hStima.toFixed(2)} mca
      </div>}
    </div>

    {/* SELEZIONE COMPONENTI */}
    <div className="cd" style={{borderLeft:'4px solid #2e86c1',marginBottom:8}}>
      <div style={{fontWeight:700,fontSize:'.8rem',color:'#1a5276',marginBottom:8}}>Componenti circolazione</div>
      {(()=>{const sA=selSetAccessori(d.tipoPisc,d.costruz,d.circ,Qtot,rip,0,0,Qmax,d.noPF);
        const autoSki=sA&&sA.ski,autoPF=sA&&sA.pf,autoBP=sA&&sA.bp;
        return(<div className="rw" style={{gap:8}}>
        {d.circ==='skimmer'&&<div style={{flex:'1 1 140px'}}>
          <label style={{fontSize:'.64rem',color:'#555',display:'block',marginBottom:2}}>Skimmer</label>
          <select value={d.manualSkiKey||''} onChange={e=>u('manualSkiKey',e.target.value||null)}
            style={{width:'100%',fontSize:'.7rem',padding:'5px 4px',border:'1.5px solid #2e86c1',borderRadius:5,background:'#eaf4fb'}}>
            <option value=''>Auto — {autoSki?autoSki.m:'—'}</option>
            {filtraSki(d.costruz).map((s,i)=><option key={i} value={s.c}>{s.m} Q≤{s.q}</option>)}
          </select>
        </div>}
        {!d.noPF&&<div style={{flex:'1 1 140px'}}>
          <label style={{fontSize:'.64rem',color:'#555',display:'block',marginBottom:2}}>Presa fondo</label>
          <select value={d.manualPFKey||''} onChange={e=>u('manualPFKey',e.target.value||null)}
            style={{width:'100%',fontSize:'.7rem',padding:'5px 4px',border:'1.5px solid #2e86c1',borderRadius:5,background:'#eaf4fb'}}>
            <option value=''>Auto — {autoPF?autoPF.m:'—'}</option>
            {filtraPF(d.tipoPisc,d.costruz).map((p,i)=><option key={i} value={p.c}>{p.m} Q≤{p.q}</option>)}
          </select>
        </div>}
        <div style={{flex:'1 1 140px'}}>
          <label style={{fontSize:'.64rem',color:'#555',display:'block',marginBottom:2}}>Bocchetta</label>
          <select value={d.manualBPKey||''} onChange={e=>u('manualBPKey',e.target.value||null)}
            style={{width:'100%',fontSize:'.7rem',padding:'5px 4px',border:'1.5px solid #2e86c1',borderRadius:5,background:'#eaf4fb'}}>
            <option value=''>Auto — {autoBP?autoBP.m:'—'}</option>
            {(C_BP||[]).map((b,i)=><option key={i} value={b.c}>{b.m} Q≤{b.q}</option>)}
          </select>
        </div>
      </div>);})()}
    </div>

    {/* RIEPILOGO IMPIANTO */}
    <div style={{background:'#eaf2fa',borderRadius:8,padding:'10px 14px',marginBottom:8,fontSize:'.76rem',lineHeight:1.8}}>
      <div style={{fontWeight:700,fontSize:'.82rem',color:'var(--bl)',marginBottom:4}}>Riepilogo impianto proposto</div>
      {sP&&<div>🔵 Pompa: <b>{sP.m} {sP.hp}HP</b> — Q max = <b>{Qmax} m³/h</b> a H min = <b>{(hStima-(d.tipoFiltro==='cartuccia'?PR.HF_C:PR.HF_S)+(d.tipoFiltro==='cartuccia'?PR.HF_C0:PR.HF_S0)).toFixed(2)} mca</b> (filtro pulito (appena lavato)) · Q min = <b>{Qmin} m³/h</b> a H max = <b>{hStima.toFixed(2)} mca</b> (filtro da rigenerare)</div>}
      {sF&&<div>🟢 Filtro: <b>{sF.nf}× {sF.m}</b> — v={sF.vf} m³/h/m²</div>}
      <div>🔶 Componenti: {nSki>0?nSki+' ski':''} {nPF>0?'· '+nPF+' PF':''} · {nBocc} bocchette</div>
      <div>🔷 Collettori: asp D.{collAsp} · man D.{collMan}</div>
      {Teff&&<div>⏱ T ricircolo stimato: <b style={{color:Teff<=Tbase?'var(--gn)':'var(--rd)'}}>{Teff}h</b> {Teff<=Tbase?'✓':'✗'} (limite {Tbase}h)</div>}
      <div style={{fontSize:'.68rem',color:'#888',marginTop:4}}>⚠ I valori definitivi di v, J e H saranno calcolati nella Fase 3 con le lunghezze reali dei tratti.</div>
    </div>

    {/* ALERT CONFORMITÀ */}
    <div style={{background:alertBg,border:'2px solid '+alertBrd,borderRadius:8,padding:'10px 14px',marginBottom:8,lineHeight:1.8}}>
      <div style={{fontWeight:800,fontSize:'.85rem',color:alertColor,marginBottom:4}}>{alertTitle}</div>
      {alerts.map((a,i)=><div key={i} style={{color:'#c0392b',fontWeight:700,fontSize:'.76rem'}}>{a}</div>)}
      {warns.map((w,i)=><div key={i} style={{color:'#b7770d',fontWeight:600,fontSize:'.76rem'}}>{w}</div>)}
    </div>

    {/* ICT — INDICE DI CONFORMITÀ TECNICA */}
    {ict&&<div style={{background:'#f8f9fa',border:'1.5px solid #dee2e6',borderRadius:8,padding:'10px 14px',marginBottom:8}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
        <div style={{background:ict.clsColor,color:'#fff',fontWeight:900,fontSize:'1.8rem',width:52,height:52,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'Calibri,serif',letterSpacing:'-1px'}}>
          {ict.cls}
        </div>
        <div>
          <div style={{fontWeight:800,fontSize:'.9rem',color:'#1a1a2e'}}>Indice di Conformità Tecnica (ICT)</div>
          <div style={{fontSize:'.72rem',color:'#555'}}>Punteggio: <b style={{color:ict.clsColor}}>{ict.ict}/100</b> — Classe <b style={{color:ict.clsColor}}>{ict.cls}</b>
            {ict.cls==='A'?' (Eccellente)':ict.cls==='B'?' (Buono)':ict.cls==='C'?' (Accettabile)':ict.cls==='D'?' (Insufficiente)':' (Non conforme)'}</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        {ict.cats.map((c,i)=>{
          const barColor=c.score>=90?'#1a7a3c':c.score>=75?'#2e86c1':c.score>=60?'#d68910':c.score>=40?'#e67e22':'#c0392b';
          return(<div key={i} style={{background:'#fff',border:'1px solid #e0e0e0',borderRadius:6,padding:'6px 8px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
              <span style={{fontSize:'.62rem',fontWeight:700,color:'#333'}}>{c.label}</span>
              <span style={{fontSize:'.7rem',fontWeight:800,color:barColor}}>{c.score}</span>
            </div>
            <div style={{background:'#e9ecef',borderRadius:3,height:5,overflow:'hidden'}}>
              <div style={{background:barColor,width:c.score+'%',height:'100%',borderRadius:3,transition:'width .3s'}}/>
            </div>
            <div style={{fontSize:'.58rem',color:'#888',marginTop:3}}>{c.note} <span style={{color:'#aaa'}}>({c.w}%)</span></div>
          </div>);
        })}
      </div>
      <div style={{fontSize:'.58rem',color:'#aaa',marginTop:6}}>A ≥ 90 · B 75–89 · C 60–74 · D 40–59 · E &lt; 40 — Pesi: Sicurezza 30% · Idraulica 25% · Filtrazione 25% · Componenti 20%</div>
    </div>}

  </div>
  <button className="bn bn-go" onClick={handleGo} disabled={!canProceed}>
    {!canProceed?'Correggere gli errori prima di procedere':'Avanti → 3. Override DN'}
  </button>
  <button className="bn bn-bk" onClick={bk}>← 1. Vasca</button>
  </F>);
}

// =====================================================================
// FASE 2 (vecchia) — ora Fase 3: TRATTI IDRAULICI
// =====================================================================
function Fase2({d,u,un,Qtot,rip,dc,dcEff,Qdim,go,bk}){
  const qA=dc.ski?dc.ski.qEa:rip.qSup; // Q singola linea skimmer (o compenso)
  const qM=dc.bocc.qEa; // Q singola linea bocchetta
  const tratti=[
    {k:'A',lb:d.circ==='skimmer'?'Skimmer più lontano → Collettore asp. (LT)':'Vasca compenso → Collettore asp. (LT)',tp:'asp',
      ds:d.circ==='skimmer'?'Misurare dal corpo dello skimmer più distante dal locale tecnico fino all\'ingresso del collettore aspirazione nel LT. Percorso reale lungo lo scavo (non in linea d\'aria).':'Misurare dall\'uscita della vasca di compenso fino all\'ingresso del collettore aspirazione nel LT.',
      Q:qA,nota:'Q = portata singola linea = '+qA.toFixed(1)+' m³/h'},
    ...(dc.pf?[{k:'PF',lb:'Presa fondo più lontana → Locale tecnico',tp:'asp',
      ds:'Misurare dalla presa fondo PIÙ DISTANTE dal LT, attraverso le giunzioni T delle altre prese in parallelo, fino al locale tecnico. Include tutto il percorso: presa→giunzione T→…→LT. I tee di giunzione delle prese vanno contati nei raccordi ('+dc.pf.n+' prese = '+(dc.pf.n-1)+' tee).',
      Q:rip.qFondo,Qdn:Qtot,nota:'Hd a Q fondo = '+rip.qFondo.toFixed(1)+' m³/h · DN a Q pompa = '+Qtot.toFixed(1)+' m³/h'}]:[]),
    {k:'C',lb:'Percorso interno locale tecnico',tp:'asp',
      ds:'Percorso DENTRO il locale tecnico: dall\'ingresso del collettore aspirazione, attraverso pompa, prefiltro, filtro, valvola selettrice (se sabbia), fino all\'uscita del collettore di mandata. Valore tipico: 2–5 m.',
      Q:Qtot,nota:'Q = portata totale = '+Qtot.toFixed(1)+' m³/h'},
    {k:'M',lb:'Collettore mandata (LT) → Bocchetta più lontana',tp:'man',
      ds:'Misurare dall\'uscita del collettore di mandata nel LT fino alla bocchetta di immissione più distante. Percorso reale lungo lo scavo.',
      Q:qM,nota:'Q = portata singola bocchetta = '+qM.toFixed(1)+' m³/h'},
  ];
  return(<F>
  <div className="cd"><h2>Fase 3 — Tratti idraulici</h2>
    <div className="nb"><b>Schema Acqualab:</b><br/>
      <b style={{color:'#a07030'}}>ASP:</b> {d.circ==='skimmer'?'Ogni skimmer':'La linea compenso'+(dc.aspFango?', la linea aspirafango':'')}{dc.pf?' e la linea PF':''} convergono in 1 collettore D.{dc.collAsp.dn.dn}.<br/>
      <b style={{color:'#2070a0'}}>MAN:</b> 1 collettore D.{dc.collMan.dn.dn} → {dc.bocc.n} bocchette, ciascuna con valvola/sfera.<br/>
      {dc.pf&&<span>PF: {dc.pf.n} prese in parallelo nella vasca → 1 linea D.{d.ovDPF||dc.pf.dnLinea.dn} al LT.<br/></span>}
      <span style={{fontSize:'.8em'}}>Per ogni tratto, misurare il <b>percorso più lungo</b> (dal componente più lontano dal locale tecnico fino al locale tecnico).</span></div>
    <div style={{background:'#fff3cd',border:'1.5px solid var(--or)',borderRadius:6,padding:8,fontSize:'.72rem',color:'#856404',marginTop:6}}>⚠ <b>Le lunghezze e i raccordi sotto sono VALORI INDICATIVI</b> per una piscina 10×5 con locale tecnico a 8m. <b>Adattarli all'impianto reale.</b> Valori errati producono una prevalenza errata e una selezione pompa sbagliata.</div>
  </div>
  {tratti.map(t=>(<div key={t.k} className="cd">
    <div style={{fontWeight:700,fontSize:'.8rem',color:t.tp==='asp'?'#a07030':'#2070a0'}}>{t.lb}</div>
    <div style={{fontSize:'.66rem',color:'#888',marginBottom:4}}>{t.ds}<br/><b>{t.nota}</b></div>
    <div className="rw">
      <div style={{display:'flex',gap:6}}>
        <div><label>L orizz. <span style={{fontSize:'.6rem',color:'#2E7D7D'}}>(Flex)</span></label>
          <input type="number" min="0" step=".5" style={{width:64}}
            value={(d.tl[t.k]&&typeof d.tl[t.k]==='object')?d.tl[t.k].h:(d.tl[t.k]||0)}
            onChange={function(e){var cur=d.tl[t.k]&&typeof d.tl[t.k]==='object'?d.tl[t.k]:{h:d.tl[t.k]||0,v:0};un('tl',t.k,{h:+e.target.value,v:cur.v});}}/>
        </div>
        <div><label>L vert. <span style={{fontSize:'.6rem',color:'#a07030'}}>(PN16)</span></label>
          <input type="number" min="0" step=".5" style={{width:64}}
            value={(d.tl[t.k]&&typeof d.tl[t.k]==='object')?d.tl[t.k].v:0}
            onChange={function(e){var cur=d.tl[t.k]&&typeof d.tl[t.k]==='object'?d.tl[t.k]:{h:d.tl[t.k]||0,v:0};un('tl',t.k,{h:cur.h,v:+e.target.value});}}/>
        </div>
      </div>
      <div><label>N. curve 90°</label><input type="number" min="0" value={d.tr[t.k].c90} onChange={e=>u('tr',{...d.tr,[t.k]:{...d.tr[t.k],c90:+e.target.value}})}/></div>
      <div><label>N. curve 45°</label><input type="number" min="0" value={d.tr[t.k].c45} onChange={e=>u('tr',{...d.tr,[t.k]:{...d.tr[t.k],c45:+e.target.value}})}/></div>
      <div><label>N. valvole a sfera</label><input type="number" min="0" value={d.tr[t.k].vs} onChange={e=>u('tr',{...d.tr,[t.k]:{...d.tr[t.k],vs:+e.target.value}})}/></div>
      <div><label>N. valvole non ritorno</label><input type="number" min="0" value={d.tr[t.k].nr} onChange={e=>u('tr',{...d.tr,[t.k]:{...d.tr[t.k],nr:+e.target.value}})}/></div>
      <div><label>N. tee (giunzioni a T)</label><input type="number" min="0" value={d.tr[t.k].td} onChange={e=>u('tr',{...d.tr,[t.k]:{...d.tr[t.k],td:+e.target.value}})}/></div>
    </div>
    {t.k==='PF'&&dc.pf&&d.tr.PF.td!==(dc.pf.n-1)&&<div style={{fontSize:'.62rem',color:'var(--or)',marginTop:2}}>💡 Suggerimento: con {dc.pf.n} prese in parallelo servono <b>{dc.pf.n-1} tee</b> (attualmente impostati: {d.tr.PF.td})</div>}
    {t.k==='A'&&d.circ==='skimmer'&&dc.ski&&dc.ski.n>1&&d.tr.A.td!==1&&<div style={{fontSize:'.62rem',color:'var(--or)',marginTop:2}}>💡 Suggerimento: 1 tee per l'innesto dello skimmer al collettore</div>}
  </div>))}
  <div className="cd"><h2>Quote altimetriche</h2>
    {d.circ==='skimmer'?(<div>
      <div className="inf">Circuito chiuso (skimmer): H statica = 0. Quote per verifica NPSH.</div>
      <div style={{fontSize:'.62rem',color:'#888',marginBottom:4}}>Riferimento: quota 0.00 = bordo vasca (piano di calpestio). Valori negativi = sotto il bordo.</div>
      <div className="rw" style={{marginTop:4}}>
        <div><label>Livello acqua (m) <span className="hn">es: −0.15 = 15cm sotto bordo</span></label><input type="number" step=".1" value={d.qt.livAcqua} onChange={e=>un('qt','livAcqua',+e.target.value)}/></div>
        <div><label>Asse pompa (m) <span className="hn">es: −1.20 = interrato</span></label><input type="number" step=".1" value={d.qt.assePompa} onChange={e=>un('qt','assePompa',+e.target.value)}/></div></div>
    </div>):(<div>
      <div className="inf">Circuito aperto (sfioro): H statica = bordo sfioro − fondo compenso.</div>
      <div style={{fontSize:'.62rem',color:'#888',marginBottom:4}}>Riferimento: quota 0.00 = bordo vasca (piano di calpestio). Valori negativi = sotto il bordo.</div>
      <div className="rw" style={{marginTop:4}}>
        <div><label>Bordo sfioro (m) <span className="hn">es: 0.00 = raso bordo</span></label><input type="number" step=".1" value={d.qt.livVasca} onChange={e=>un('qt','livVasca',+e.target.value)}/></div>
        <div><label>Fondo compenso (m) <span className="hn">es: −1.50</span></label><input type="number" step=".1" value={d.qt.fondoCompenso} onChange={e=>un('qt','fondoCompenso',+e.target.value)}/></div>
        <div><label>Asse pompa (m) <span className="hn">es: −1.20</span></label><input type="number" step=".1" value={d.qt.assePompa} onChange={e=>un('qt','assePompa',+e.target.value)}/></div></div>
      {(()=>{const df=(d.qt.assePompa||0)-(d.qt.fondoCompenso||0);return df>2?<div className="wr">Pompa {df.toFixed(1)}m sopra fondo compenso — verificare NPSH</div>:null;})()}
    </div>)}
  </div>
  <div className="cd" style={{borderLeft:'3px solid #c0ccee'}}>
    <div style={{fontSize:'.7rem',fontWeight:700,color:'var(--bl)',marginBottom:6}}>⚙ Override DN collettori <span style={{fontWeight:400,color:'#888'}}>(lasciare vuoto = calcolo automatico)</span>
      {!(d.selImpianto&&d.selImpianto.Qmax)&&<span style={{color:'var(--or)',fontSize:'.7rem',marginLeft:8}}>⚠ Eseguire Fase 3 prima per i valori definitivi</span>}
      {(d.ovCa||d.ovCm||d.ovNSki||d.ovNBocc||d.ovNPF||d.ovDSki||d.ovDPF||d.ovDBocc||d.ovDC1||d.ovDC2||d.ovDC3)&&
        <button className="bn-sm" style={{marginLeft:8,background:'#fadbd8',color:'#922b21',borderColor:'#e74c3c',fontSize:'.6rem'}}
          onClick={()=>{u('ovCa',null);u('ovCm',null);u('ovNSki',null);u('ovNBocc',null);u('ovNPF',null);u('ovDSki',null);u('ovDPF',null);u('ovDBocc',null);u('ovDC1',null);u('ovDC2',null);u('ovDC3',null);}}>
          ✕ Reset tutti gli override
        </button>}
    </div>
    <div className="rw">
      <div>
        <label>Coll. aspirazione <span className="hn">DN auto: {dcEff&&dcEff.collAsp?dcEff.collAsp.dn.dn:'—'}</span></label>
        <select value={d.ovCa||''} onChange={e=>u('ovCa',e.target.value||null)}>
          <option value="">Auto (D.{(d.selImpianto&&d.selImpianto.collAspDN)||(dc&&dc.collAsp?dc.collAsp.dn.dn:'—')})</option>
          {[50,63,75,90,110,125,140,160,200].map(dn=><option key={dn} value={dn}>D.{dn}</option>)}
        </select>
        {d.ovCa&&+d.ovCa!==(dc&&dc.collAsp?dc.collAsp.dn.dn:0)&&<div style={{fontSize:'.6rem',color:'var(--or)',marginTop:2}}>⚠ Override: D.{d.ovCa} (auto D.{dc&&dc.collAsp?dc.collAsp.dn.dn:'—'})</div>}
      </div>
      <div>
        <label>Coll. mandata <span className="hn">DN auto: {dcEff&&dcEff.collMan?dcEff.collMan.dn.dn:'—'}</span></label>
        <select value={d.ovCm||''} onChange={e=>u('ovCm',e.target.value||null)}>
          <option value="">Auto (D.{(d.selImpianto&&d.selImpianto.collManDN)||(dc&&dc.collMan?dc.collMan.dn.dn:'—')})</option>

// =====================================================================
// FASE 3 — con multi-circuito automatico
// =====================================================================
function Fase3({d,u,Qtot,rip,sup,perim,volTot,dc,go,bk}){
  // --- FUNZIONE: calcola tratti per una data portata di circuito ---
  function calcTrCirc(Qc,ripC,nSkiC,nBoccC,nPFC,Qdm){
    const Qdim=(Qdm&&Qdm>0)?Qdm:Qc; // Q max pompa per tratti LT
    const qA=ripC.qSup/nSkiC;
    const qPF_hd=ripC.qFondo;
    const qPF_dn=Qdm||Qc; // sicurezza
    const qCt=Qc;
    const qM=Qdm/nBoccC; // bocchette dimensionate a Qdim
    const hasPF=nPFC>0;
    const tratti=[
      {k:'A',tp:'asp',Q:qA,Qdn:qA,dnMin:d.circ==='skimmer'?PR.DN_MIN_SKI:0},
      ...(hasPF?[{k:'PF',tp:'asp',Q:qPF_hd,Qdn:Qdm||Qc,dnMin:PR.DN_MIN_PF}]:[]),
      {k:'C',tp:'asp',Q:qCt,Qdn:qCt,dnMin:0},
      {k:'C1',tp:'asp',Q:Qdm,Qdn:Qdm,dnMin:0},
      {k:'C2',tp:'man',Q:Qdm,Qdn:Qdm,dnMin:0},
      {k:'C3',tp:'man',Q:Qdm,Qdn:Qdm,dnMin:0},
      {k:'M',tp:'man',Q:qM,Qdn:qM,dnMin:PR.DN_MIN_BOCC}
    ];
    const tc={};
    for(const t of tratti){
      let dn;
      const ttK=t.k==='C'||t.k==='PF'||t.k==='C1'||t.k==='C2'||t.k==='C3'?'pn10':(d.tt&&d.tt[t.k]?d.tt[t.k]:d.tipoTubo);
      if(t.k==='A'&&d.ovDSki){const tb=ttK==='flex'?TFL:T16;const f=tb.find(x=>x.dn===+d.ovDSki);dn=f?{...f,ok:true,jOk:true,vWarn:false,warns:[]}:selDN(t.Qdn,t.tp,ttK,d.tipoPisc,t.dnMin);}
      else if(t.k==='PF'&&d.ovDPF){const tb=T10;const f=tb.find(x=>x.dn===+d.ovDPF);dn=f?{...f,ok:true,jOk:true,vWarn:false,warns:[]}:selDN(t.Qdn,t.tp,ttK,d.tipoPisc,t.dnMin);}
      else if(t.k==='M'&&d.ovDBocc){const tb=ttK==='flex'?TFL:T16;const f=tb.find(x=>x.dn===+d.ovDBocc);dn=f?{...f,ok:true,jOk:true,vWarn:false,warns:[]}:selDN(t.Qdn,t.tp,ttK,d.tipoPisc,t.dnMin);}
      else if(t.k==='C1'&&d.ovDC1){const f=T10.find(x=>x.dn===+d.ovDC1);dn=f?{...f,ok:true,jOk:true,vWarn:false,warns:[]}:selDN(t.Qdn,t.tp,ttK,d.tipoPisc,t.dnMin);}
      else if(t.k==='C2'&&d.ovDC2){const f=T10.find(x=>x.dn===+d.ovDC2);dn=f?{...f,ok:true,jOk:true,vWarn:false,warns:[]}:selDN(t.Qdn,t.tp,ttK,d.tipoPisc,t.dnMin);}
      else if(t.k==='C3'&&d.ovDC3){const f=T10.find(x=>x.dn===+d.ovDC3);dn=f?{...f,ok:true,jOk:true,vWarn:false,warns:[]}:selDN(t.Qdn,t.tp,ttK,d.tipoPisc,t.dnMin);}
      else{dn=selDN(t.Qdn,t.tp,ttK,d.tipoPisc,t.dnMin);}
      // Per C1/C2/C3 non sommare lunghezze (tratto C le include già)
      const L=t.k==='C1'||t.k==='C2'||t.k==='C3'?0:tlTot(d.tl,t.k==='C'?'C':t.k);
      const r=d.tr[t.k]||{};const lq=t.k==='C1'||t.k==='C2'||t.k==='C3'?0:calcLeq(dn.dn,r);
      const hd=calcHd(t.Q,dn.di,L+lq);const jEx=hzJ(t.Q,dn.di);const vEx=(t.Q/3600)/sez(dn.di);
      // Verifica velocità per C1/C2/C3
      const isT2=d.tipoPisc==='Tipo 2';
      const vLim=t.tp==='asp'?(isT2?PR.V_A_T2:PR.V_A_DOM):(isT2?PR.V_M_T2:PR.V_M_DOM);
      const jLim=t.tp==='asp'?PR.J_A:PR.J_M;
      const ltOk=vEx<=vLim;
      const warns=vEx>vLim?['v='+vEx.toFixed(2)+' m/s > limite '+vLim+' m/s']:[];
      tc[t.k]={...t,...dn,vEx:+vEx.toFixed(3),jEx:+(jEx*1000).toFixed(1),L,lq:+lq.toFixed(1),hd:+hd.toFixed(3),
        ok:t.k==='C1'||t.k==='C2'||t.k==='C3'?ltOk:dn.ok,warns};
    }
    if(!hasPF)tc.PF={hd:0,ok:true};
    const percAsp=tc.A.hd>=(tc.PF.hd||0)?'A':'PF';
    const hAsp=Math.max(tc.A.hd,(tc.PF.hd||0))+tc.C.hd;
    const hMan=tc.M.hd;
    const hF=d.tipoFiltro==='cartuccia'?PR.HF_C:PR.HF_S;
    const hVL=d.tipoFiltro==='cartuccia'?0:PR.H_VL;
    let hStat=0;if(d.circ==='sfioro')hStat=Math.max(0,(d.qt.livVasca||0)-(d.qt.fondoCompenso||0));
    const hTot=+(hAsp+hMan+hF+hStat+PR.H_PF+hVL+0.5).toFixed(2);
    // allOk esclude C1/C2/C3 dalla verifica J (sono tratti brevi LT, solo v conta)
    const checkTc=Object.entries(tc).filter(([k])=>k!=='C1'&&k!=='C2'&&k!=='C3'&&(hasPF||k!=='PF')).map(([,v])=>v);
    const checkLT=[tc.C1,tc.C2,tc.C3].filter(Boolean);
    const allOk=checkTc.every(c=>c.ok)&&checkLT.every(c=>c.ok);
    return{tc,percAsp,hAsp,hMan,hTot,hF,hVL,hStat,allOk,qA,qPF_hd,qPF_dn,qM,nSki:nSkiC,nBocc:nBoccC,nPF:nPFC,Qcirc:Qc,ripC};
  }

  // --- STEP 1: prova circuito singolo ---
  // Per sfioro: non ci sono skimmer, il tratto A è la linea compenso (porta tutta qSup)
  const nSkiTot=dc.ski?dc.ski.n:1; // sfioro: 1 linea compenso
  const nBoccTot=dc.bocc.n;
  const nPFtot=dc.pf?dc.pf.n:0;
  const QdimCirc=Qdim||( dc&&dc.bocc?dc.bocc.qTot:Qtot);
  let r=calcTrCirc(Qtot,rip,nSkiTot,nBoccTot,nPFtot,QdimCirc);
  let nCirc=1;

  // --- STEP 2: se D. insufficiente, calcola N circuiti automaticamente ---
  if(!r.allOk){
    const tb=d.tipoTubo==='flex'?TFL:T16;
    const dnMax=tb[tb.length-1];
    const vmAsp=d.tipoPisc==='Tipo 2'?PR.V_A_T2:PR.V_A_DOM;
    const QmaxAsp=sez(dnMax.di)*vmAsp*3600;
    nCirc=Math.max(2,Math.ceil(Qtot/QmaxAsp));
    // Ricalcola finché tutti i DN sono ok (max 10 tentativi)
    for(let try_n=nCirc;try_n<=10;try_n++){
      const Qper=Qtot/try_n;
      const pS=d.tipoPisc==='Tipo 2'?0.75:2/3;
      const ripPer={qSup:Qper*pS,qFondo:Qper*(1-pS),pSup:rip.pSup,pFondo:rip.pFondo,note:rip.note};
      const supPer=sup/try_n;
      const nSkiPer=d.circ==='skimmer'?Math.max(1,Math.ceil(supPer/(d.tipoPisc==='Tipo 2'?20:25))):1; // sfioro: 1 linea compenso per circuito
      const nBoccPer=Math.max(2,Math.ceil(Qper/5));
      const pfDisp=filtraPF(d.tipoPisc,d.costruz||'calcestruzzo');
      let nPFper=2;
      for(const pf of pfDisp){const n=Math.max(2,nPreseFondoSicurezza(Qper,pf.q),nPreseFondo(ripPer.qFondo));const qpp=Qper/(n-1);if(qpp<=pf.q){nPFper=n;break;}}
      const rTry=calcTrCirc(Qper,ripPer,nSkiPer,nBoccPer,nPFper);
      if(rTry.allOk){nCirc=try_n;r=rTry;break;}
    }
  }

  const {tc,percAsp,hAsp,hMan,hTot,hF,hVL,hStat,allOk,qA,qPF_hd,qPF_dn,qM}=r;
  const Qcirc=r.Qcirc;
  const filtri=selFiltri(Qcirc,d.tipoPisc,d.tipoFiltro);
  // Collettore per circuito
  // dnUscitaAsp = tratto C (collettore→pompa), non il ramo entrante
  const dnUscitaAsp=tc.C?tc.C.dn:(d.noPF?tc.A.dn:Math.max(tc.A.dn,tc.PF?tc.PF.dn:0));
  const collAspC=selDNcoll(Qcirc,'asp','pn10',dnUscitaAsp,d.tipoPisc,1);
  // Collettori sempre PN10 indipendentemente dal tubo dei rami
  const collManC=selDNcoll(Qcirc,'man','pn10',tc.M.dn,d.tipoPisc,(dc&&dc.bocc)?dc.bocc.n:nBoccPerCirc);

  return(<F>
  <div className="cd"><h2>Fase 3 — Dimensionamento idraulico {nCirc>1&&<span style={{color:'var(--or)'}}> — {nCirc} CIRCUITI INDIPENDENTI</span>}</h2>

    {nCirc>1&&<div style={{background:'#fff3cd',border:'2px solid var(--or)',borderRadius:8,padding:10,marginBottom:8,fontSize:'.76rem'}}>
      <b style={{color:'var(--or)',fontSize:'.9rem'}}>MULTI-CIRCUITO AUTOMATICO</b><br/>
      La portata totale Q={Qtot.toFixed(1)} m³/h supera la capacità di un singolo circuito ({d.tipoTubo==='rigido'?'D.200 PVC PN16':'D.125 Flex'}).<br/>
      <b>Soluzione: {nCirc} circuiti indipendenti</b>, ciascuno con Q = {Qcirc.toFixed(1)} m³/h<br/>
      Ogni circuito ha: {r.nSki} skimmer + {r.nPF} PF + {r.nBocc} bocchette + proprio collettore asp/man + propria pompa + proprio filtro<br/>
      <b>Totale componenti:</b> {r.nSki*nCirc} skimmer · {r.nPF*nCirc} PF · {r.nBocc*nCirc} bocchette · {nCirc} pompe · {nCirc} filtri {d.tipoPisc==='Tipo 2'?'+ '+(nCirc)+' pompa riserva':''}
    </div>}

    <div className="nb" style={{marginBottom:6}}><b>Metodo:</b> Hazen-Williams C=150 (PVC). {nCirc>1?'Valori per singolo circuito (Q='+Qcirc.toFixed(1)+' m³/h).':''}<br/>
      <b>Criterio primario: perdite di carico distribuite</b><br/>
      • <b>Aspirazione:</b> J ≤ {PR.J_A*1000} mm/m → verifica v ≤ {d.tipoPisc==='Tipo 2'?PR.V_A_T2:PR.V_A_DOM} m/s{d.tipoPisc==='Domestica'?' (target ≤ '+PR.V_A_DOM_TGT+')':''}<br/>
      • <b>Mandata:</b> J ≤ {PR.J_M*1000} mm/m → verifica v ≤ {d.tipoPisc==='Tipo 2'?PR.V_M_T2:PR.V_M_DOM} m/s{d.tipoPisc==='Domestica'?' (target ≤ '+PR.V_M_DOM_TGT+')':''}<br/>
      <span style={{fontSize:'.6rem',color:'#888'}}>{d.tipoPisc==='Tipo 2'?'UNI 10637:2024: velocità = limite sicurezza vincolante. Perdite di carico = criterio dimensionamento reale.':'Domestica: velocità = criteri progettuali Acqualab. UNI EN 13451 norma solo la griglia prese fondo (v ≤ 0,5 m/s).'}</span></div>

    {/* SCHEMA CIRCUITO */}
    <div style={{background:'#faf8f2',border:'1.5px solid var(--c3)',borderRadius:6,padding:10,margin:'6px 0',fontFamily:'monospace',fontSize:'.64rem',lineHeight:1.8}}>
      <b>SCHEMA {nCirc>1?'SINGOLO CIRCUITO (×'+nCirc+')':'CIRCUITO IDRAULICO'}:</b><br/>
      <span style={{color:'#a07030'}}>{r.nSki+'× Ski ──[A: DN'+tc.A.dn+' Q='+qA.toFixed(1)+']── VS ──┐'}</span><br/>
      {r.nPF>0&&<span style={{color:'#a07030'}}>{r.nPF+'× PF ──[PF: DN'+(tc.PF.dn||'—')+' Q='+qPF_hd.toFixed(1)+']── VS ──┤'}</span>}{r.nPF>0&&<br/>}
      {'                              Coll.asp D.'+collAspC.dn+' ──┘'}<br/>
      {'                                │'}<br/>
      {'       [C: DN'+tc.C.dn+' Q='+Qcirc.toFixed(1)+'] ── 1× Pompa → 1× Filtro'}<br/>
      {'                                │'}<br/>
      {'                              Coll.man D.'+collManC.dn+' ──┐'}<br/>
      <span style={{color:'#2070a0'}}>{r.nBocc+'× Bocc ──[M: DN'+tc.M.dn+' Q='+qM.toFixed(1)+']── VS ──┘'}</span>
    </div>
    <div style={{fontSize:'.64rem',color:'#555',margin:'4px 0 8px',lineHeight:1.5}}>
      <b>Prevalenza:</b> perdite di tutto il circuito: ramo asp. peggiore ({percAsp==='A'?(d.circ==='skimmer'?'skimmer':'compenso')+' '+tc.A.hd.toFixed(3):'PF '+(tc.PF.hd||0).toFixed(3)}) + locale tecnico ({tc.C.hd.toFixed(3)}) + mandata ({tc.M.hd.toFixed(3)}) + filtro + accessori.<br/>
      {r.nPF>0&&<div><b>Nota PF:</b> D.{tc.PF.dn||'—'} dimensionato per sicurezza a Q={qPF_dn.toFixed(1)} m³/h (tutte le asp. chiuse). In esercizio: {qPF_hd.toFixed(1)} m³/h.</div>}
    </div>

    <table className="t"><thead><tr><th>Tratto</th><th>Q eserc. m³/h</th><th>Q dim. DN m³/h</th><th>D.</th><th>v m/s</th><th>J mm/m</th><th>L tubo m</th><th>Leq racc. m</th><th>L totale m</th><th>Perdita mca</th><th></th></tr></thead>
    <tbody>{Object.entries(tc).filter(([k])=>!(k==='PF'&&r.nPF===0)&&k!=='C').map(([k,c])=>{
      if(!c.dn)return null;
      const isT2=d.tipoPisc==='Tipo 2';
      const vL=c.tp==='asp'?(isT2?PR.V_A_T2:PR.V_A_DOM):(isT2?PR.V_M_T2:PR.V_M_DOM);
      const vTgt=(!isT2)?(c.tp==='asp'?PR.V_A_DOM_TGT:PR.V_M_DOM_TGT):null;
      const jL=c.tp==='asp'?PR.J_A*1000:PR.J_M*1000;

    })}</tbody></table>
    <div style={{fontSize:'.62rem',color:'#888',marginTop:3}}>★ = ramo che determina la prevalenza. <b>Q eserc.</b> = portata in condizioni normali (per calcolo perdite). <b>Q dim. DN</b> = portata per scelta del diametro (per PF è l'intera portata pompa, per sicurezza anti-intrappolamento). {d.tipoPisc==='Domestica'?'BP = conforme ma sopra target best practice.':''} {nCirc>1?'Valori per singolo circuito.':''} Leq racc. = lunghezza equivalente dei raccordi.</div>

    {/* WARNINGS VELOCITÀ — VERIFICA INCROCIATA */}
    {(()=>{

  </div>

  <div className="cd"><h2>Prevalenza base <span style={{fontSize:'.6rem',fontWeight:400,color:'#888'}}>(mca = metri colonna d'acqua)</span> {nCirc>1?'(per circuito)':''}</h2>

    u('risultati',{...d.risultati,tc,hTot,filtri,nCirc,Qcirc,collAspC,collManC,nSkiPerCirc:r.nSki,nBoccPerCirc:r.nBocc,nPFperCirc:r.nPF,hTotDef,hAcc,hF:r.hF});
    go();
  }} disabled={!allOk||filtri.length===0}>{!allOk?'D. fuori norma':filtri.length===0?'Nessun filtro':'Avanti → 5. Esecutiva'}</button>

function Fase5({d,u,Qtot,rip,sup,perim,volTot,dc:dcPrelim,pr,go,bk}){
  // Se Q attuale differisce >5% da quella salvata, ignora risultati vecchi
  const _rSaved=d.risultati&&Math.abs((d.risultati.Qcirc||0)-Qtot/( d.risultati.nCirc||1))<Qtot*0.05?d.risultati:null;
  const nCirc=_rSaved&&_rSaved.nCirc||1;
  const QprogBase=_rSaved&&_rSaved.Qcirc||Qtot;
  const nPompeCalc=d.tipoPisc==='Tipo 2'?2:1;
  const hAcc=(d.acc&&d.acc.ris?PLC.ris:0)+(d.acc&&d.acc.ele?PLC.ele:0)+(d.acc&&d.acc.dos?PLC.dos:0)+(d.acc&&d.acc.uv?PLC.uv:0);
  const supCirc=nCirc>1?sup/nCirc:sup;

  // --- CALCOLO CONFIGURAZIONI ---
  const isDom=d.tipoPisc==='Domestica';
  const Tbase=pr.T||d.tRic||5;
  const hTprog=(()=>{
    const isCart=d.tipoFiltro==='cartuccia';
    const hFCurrent=isCart?PR.HF_C:PR.HF_S;
    const hSaved=_rSaved&&_rSaved.hTotDef||_rSaved&&_rSaved.hTot||0;
    const hFSaved=_rSaved&&_rSaved.hF;
    if(!hSaved) return hFCurrent+3.5; // nessun dato salvato
    if(!hFSaved) {
      // progetto vecchio senza hF salvato: non possiamo correggere, ricalcola
      // hBase = hSaved - vecchio HF_C (5.3) + nuovo HF_C (7.0) — applica delta fisso
      const deltaF=hFCurrent-(isCart?5.3:6); // delta rispetto ai valori pre-aggiornamento
      return +(hSaved+deltaF).toFixed(2);
    }
    // hF salvato disponibile: correggi se diverso
    if(Math.abs(hFSaved-hFCurrent)>0.1) return +(hSaved-hFSaved+hFCurrent).toFixed(2);
    return hSaved;
  })();
  const volCalc=d.circ==='sfioro'&&pr.volTotConComp?pr.volTotConComp:volTot;
  const qGiochi=d.giochi?d.giochi.reduce(function(s,g){return s+(g.q||0);},0)/nCirc:0;

  function calcCfg(Qp){
    var a=autoSelFP(Qp,d.tipoPisc,d.tipoFiltro,supCirc,nPompeCalc,hTprog);
    var sf=a.filtro,sp=a.pompa,np=a.nPompe||nPompeCalc;
    var Qdm=a.qClean||Qp,dcR=dcPrelim;
    if(sp){
      var isC=d.tipoFiltro==='cartuccia';
      var hFP=isC?PR.HF_C0:PR.HF_S0,hFS=isC?PR.HF_C:PR.HF_S;
      for(var it=0;it<4;it++){
        var rI=calcRip(Qdm,d.tipoPisc);
        dcR=dimCirc(Qdm,rI.qSup,rI.qFondo,d.circ,d.tipoPisc,d.tt||d.tipoTubo,d.tipoSfioro,supCirc,d.costruz,d.noPF,d.ovNSki,d.ovNBocc,d.ovNPF,d.ovDSki,d.ovDPF,d.ovDBocc,Qdm,d.ovDC1,d.ovDC2,d.ovDC3,(a.qMin?+(Qdm+a.qMin)/2:Qdm));
        var hC=calcHcircuito(Qdm,d.tipoPisc,d.circ,d.tt||d.tipoTubo,d.tipoFiltro,supCirc,d.tl,d.tr,d.qt,hAcc);
        var hCl=+(hC-hFS+hFP).toFixed(2);
        var nQ=+pumpQatH(sp,Math.max(0,hCl)).toFixed(1);
        if(Math.abs(nQ-Qdm)<0.3)break;
        Qdm=nQ;
      }
    }
    var nfE=sf?(sf.nf||1):1;
    // Calcolo iterativo Qmin (filtro sporco (da pulire) per intersezione curva pompa/impianto
    var QmPP=a.qMin||Qp;
    if(sp){
      var hFS2=isC?PR.HF_C:PR.HF_S;
      for(var it2=0;it2<6;it2++){
        var hSp=calcHcircuito(QmPP,d.tipoPisc,d.circ,d.tt||d.tipoTubo,d.tipoFiltro,supCirc,d.tl,d.tr,d.qt,hAcc);
        var nQsp=+pumpQatH(sp,Math.max(0,hSp)).toFixed(2);
        if(Math.abs(nQsp-QmPP)<0.05)break;
        QmPP=nQsp;
      }
    }
    var QmT=QmPP*nfE*nCirc;
    var Te=QmT>0?+(volCalc/QmT).toFixed(1):null;
    var co=(sf?sf.ct:0)+(sp?sp.p*np:0);
    return{sF:sf,sP:sp,auto:a,Qmax:Qdm,dc:dcR,QminPerPompa:QmPP,nfEff:nfE,QminTotale:QmT,Teff:Te,Qprog:Qp,nPompe:np,costo:co};
  }

  var configs=[];
  // Recupera scelte Fase 2
  const f2pump=d.selImpianto&&d.selImpianto.pumpKey;
  const f2filtro=d.selImpianto&&d.selImpianto.filtroKey;
  const allPumps=Object.entries(C_PM).reduce(function(acc,e){e[1].forEach(function(p){acc.push(Object.assign({},p,{forn:e[0]}));});return acc;},[]);
  // Pompa scelta in Fase 2 — verifica che sia ancora sufficiente con i parametri attuali
  const pumpF2raw=f2pump?allPumps.find(function(p){return p.forn+':'+p.c===f2pump;}):null;
  // Usa calcCfg per ottenere H progetto corrente (con HF_C aggiornato)
  const _cfgAuto=calcCfg(QprogBase);
  const hProjCheck=_cfgAuto.sF?(_rSaved&&_rSaved.hTotDef||hTprog||9.89):hTprog;
  const qF2check=pumpF2raw&&pumpF2raw.qh?pumpQatH(pumpF2raw,hProjCheck):0;
  const pumpF2=(pumpF2raw&&qF2check>=QprogBase)?pumpF2raw:null;
  // Per i 3 scenari: usa pompa F2 per Riferimento, cerca pompa più potente/meno potente
  const pumpsOrdered=allPumps.filter(function(p){return p.hp>0;}).sort(function(a,b){return a.hp-b.hp;});
  const refPump=pumpF2||(allPumps.find(function(p){return p.forn+':'+p.c===((calcCfg(QprogBase).sP||{forn:'',c:''}).forn+':'+(calcCfg(QprogBase).sP||{c:''}).c);})||calcCfg(QprogBase).sP);
  const refIdx=refPump?pumpsOrdered.findIndex(function(p){return p.c===refPump.c&&p.forn===refPump.forn;}):-1;
  const fasterPump=refIdx>0?pumpsOrdered[refIdx-1]:null;
  const slowerPump=refIdx>=0&&refIdx<pumpsOrdered.length-1?pumpsOrdered[refIdx+1]:null;

  function calcCfgFixed(Qp,forcePump){
    var cfg=calcCfg(Qp);
    if(forcePump) cfg=Object.assign({},cfg,{sP:forcePump});
    // Usa filtro da Fase 2 se disponibile
    if(f2filtro){
      var parts=f2filtro.split(':'),fo=parts[0],co=parts[1],nf=parseInt(parts[2])||1;
      var fc=(FC[fo]||FS_P[fo]||FS_U[fo]||[]);
      for(var fi=0;fi<fc.length;fi++){if(fc[fi].c===co){
        var fe=Object.assign({},fc[fi],{nf:nf,forn:fo});
        fe.vf=+(Qp*PR.MARG_F/nf/(fc[fi].sf||1)).toFixed(1);
        fe.qpf=+(Qp*PR.MARG_F/nf).toFixed(1);
        fe.ct=+(fc[fi].p*nf).toFixed(0);
        cfg=Object.assign({},cfg,{sF:fe});break;}}
    }
    return cfg;
  }

  if(isDom){
    var Tfast=+(Tbase*0.85).toFixed(1);
    var Tslow=+(Tbase*1.15).toFixed(1);
    configs.push({label:'Prestante',desc:'T = '+Tfast+'h (-15%)',T:Tfast,...calcCfgFixed(volCalc/Tfast/nCirc+qGiochi,fasterPump||refPump)});
    configs.push({label:'Riferimento',desc:'T = '+Tbase+'h (impostato)',T:Tbase,...calcCfgFixed(QprogBase,refPump)});
    configs.push({label:'Economico',desc:'T = '+Tslow+'h (+15%)',T:Tslow,...calcCfgFixed(volCalc/Tslow/nCirc+qGiochi,slowerPump||refPump)});
  } else {
    configs.push({label:'Normativo',desc:'Prospetto 3 UNI 10637',T:null,...calcCfgFixed(QprogBase,refPump)});
  }

  const[selIdx,setSelIdx]=useState(isDom?1:0);
  // Picker manuale - 1 solo useState
  const[pk,setPk]=useState({mp:null,mf:null,mpf:null,mbp:null,msk:null});
  function spk(k,v){setPk(function(p){var n={mp:p.mp,mf:p.mf,mpf:p.mpf,mbp:p.mbp,msk:p.msk};n[k]=v;return n;});}
  var manualPumpKey=pk.mp,manualFiltroKey=pk.mf,manualPFKey=pk.mpf,manualBPKey=pk.mbp,manualSkiKey=pk.msk;
  function setManualPumpKey(v){spk('mp',v);}function setManualFiltroKey(v){spk('mf',v);}
  function setManualPFKey(v){spk('mpf',v);}function setManualBPKey(v){spk('mbp',v);}
  function setManualSkiKey(v){spk('msk',v);}
  const sel=configs[selIdx]||configs[0];
  var sF=sel.sF;
  if(manualFiltroKey){var _mk=manualFiltroKey.split(':'),_fo=_mk[0],_co=_mk[1],_nf=parseInt(_mk[2])||1;
    var _fc=(FC[_fo]||FS_P[_fo]||FS_U[_fo]||[]);
    for(var _fi=0;_fi<_fc.length;_fi++){if(_fc[_fi].c===_co){
      var _e=Object.assign({},_fc[_fi],{nf:_nf,forn:_fo});
      var _qp=(sel&&sel.Qprog)||Qtot;
      _e.vf=+(_qp*PR.MARG_F/_nf/(_fc[_fi].sf||1)).toFixed(1);
      _e.qpf=+(_qp*PR.MARG_F/_nf).toFixed(1);
      var _ct=_fc[_fi].p*_nf;
      if(!_fc[_fi].vi){var _vlo=C_VL[_fo]||[];var _vl=Array.isArray(_vlo)?_vlo:(_fc[_fi].vg&&_vlo[_fc[_fi].vg]?_vlo[_fc[_fi].vg]:[]);
        var _vsz=(_fc[_fi].d||0)>=1000?'3"':(_fc[_fi].d||0)>=700?'2"':'1.5"';
        for(var _vi=0;_vi<_vl.length;_vi++){if(_vl[_vi].cn===_vsz){_ct+=_vl[_vi].p*_nf;_e.valvC=_vl[_vi].cn;_e.valvP=_vl[_vi].p;break;}}
      }
      _e.ct=+_ct.toFixed(0);sF=_e;break;}}
  }
  var sF_auto=sel.sF;
  const sP=manualPumpKey?(()=>{var _all=[];Object.entries(C_PM).forEach(function(e){e[1].forEach(function(p){_all.push(Object.assign({},p,{forn:e[0]}));});});return _all.find(function(p){return p&&p.c&&p.forn+':'+p.c===manualPumpKey;})||sel.sP;})():sel.sP;
  const forn=sF?sF.forn:null;const nPompe=sel.nPompe;
  const Qmax=sel.Qmax;
  const dc=(function(){
    var base=sel.dc;if(!base)return base;
    var out=Object.assign({},base);
    var T10l=[{dn:50,di:.0444},{dn:63,di:.0562},{dn:75,di:.0672},{dn:90,di:.0810},{dn:110,di:.0992},{dn:125,di:.1128},{dn:140,di:.1264},{dn:160,di:.1444},{dn:200,di:.1810}];
    var T16l=[{dn:50,di:.0426},{dn:63,di:.0536},{dn:75,di:.0638},{dn:90,di:.0766},{dn:110,di:.0968},{dn:125,di:.1102},{dn:140,di:.1234},{dn:160,di:.1410},{dn:200,di:.1762}];
    function ovDnL(dnObj,dnOv){if(!dnOv||!dnObj)return dnObj;var dn=+dnOv;var t=T10l.find(function(x){return x.dn===dn;})||T16l.find(function(x){return x.dn===dn;});if(!t)return dnObj;var pi=Math.PI;function sezL(di){return pi*Math.pow(di/2,2);}var v=+((sel.Qmax||Qtot)/3600/sezL(t.di)).toFixed(2);return Object.assign({},dnObj,{dn:dn,di:t.di,v:v,ok:true,ovr:true});}
    if(d.ovCa&&out.collAsp){var avA=out.collAsp.dn&&out.collAsp.dn.dn;if(+d.ovCa!==avA)out.collAsp=Object.assign({},out.collAsp,{dn:ovDnL(out.collAsp.dn,d.ovCa)});}
    if(d.ovCm&&out.collMan){var avM=out.collMan.dn&&out.collMan.dn.dn;if(+d.ovCm!==avM)out.collMan=Object.assign({},out.collMan,{dn:ovDnL(out.collMan.dn,d.ovCm)});}
    return out;
  })();
  const Qcirc=Qmax;const hT=hTprog;
  const QminPerPompa=sel.QminPerPompa;const nfEff=sel.nfEff;const QminTotale=sel.QminTotale;
  const Teff=sel.Teff;const auto=sel.auto;const Qprog=sel.Qprog;

  const nSkiPerCirc=dc.ski?dc.ski.n:nSkimmer(supCirc,d.tipoPisc);
  const nBoccPerCirc=dc.bocc.n;
  const nPFperCirc=dc.pf?dc.pf.n:0;
  const nSki=nSkiPerCirc;
  // --- SELEZIONE SET ACCESSORI COERENTE (per circuito) ---
  const ripCirc=nCirc>1?{qSup:Qcirc*(d.tipoPisc==='Tipo 2'?0.75:2/3),qFondo:Qcirc*(d.tipoPisc==='Tipo 2'?0.25:1/3),pSup:rip.pSup,pFondo:rip.pFondo}:calcRip(Qmax,d.tipoPisc,d.noPF);
  const setAcc=selSetAccessori(d.tipoPisc,d.costruz,d.circ,Qcirc,ripCirc,0,0,Qmax,d.noPF);
  const sPF=d.noPF?null:((d.manualPFKey?filtraPF(d.tipoPisc,d.costruz).find(function(p){return p.c===d.manualPFKey;}):null)||setAcc.pf);
  const sBP=(d.manualBPKey?filtraBP(d.costruz).find(function(b){return b.c===d.manualBPKey;}):null)||setAcc.bp;
  const sS=(d.manualSkiKey?filtraSki(d.costruz).find(function(s){return s.c===d.manualSkiKey;}):null)||setAcc.ski;
  const nPF_eff=d.noPF?0:(nCirc>1?nPFperCirc:(sPF?Math.max(2,nPreseFondoSicurezza(Qmax,sPF.q),nPreseFondo(ripCirc.qFondo)):(setAcc.nPF||2)));
  const qPerPresaReale=sPF&&nPF_eff>0?(setAcc.qPP||(Qcirc/(Math.max(1,nPF_eff-1)))):0;
  const dnRamoPF_r=qPerPresaReale>0?selDN(qPerPresaReale,'asp',d.tipoTubo,d.tipoPisc,PR.DN_MIN_PF):null;
  const qMaxGrigliaReale=sPF?sPF.q:(d.tipoPisc==='Tipo 2'?16:17);
  const pfSicReale=d.noPF?{ok:true,err:[],warn:[],info:[]}:verificaSicurezzaPF(nPF_eff, qMaxGrigliaReale, Qcirc, d.tipoPisc);
  const vr=verNorm(d.tipoPisc,d.circ,sup,perim,sF?(sF.nf*nCirc):0,nPompe*nCirc,nSki*nCirc,Qmax*nCirc,ripCirc,pfSicReale,pr);

// FASE 6 — AVVIAMENTO + GENERA PROMPT RELAZIONE TECNICA

function Fase6({d,volTot,Qtot,dc,pr,bk,saveProject,setD,setFase}){
  const Tsel_display=(d.risultati||{}).Tsel||pr.T||d.tRic||5;
  const av=calcAvvio(d.tipoPisc,d.circ);
  const prm=[['pH',av.b.pH,''],['Cloro libero',av.b.cl,'mg/l'],['Cloro comb. (max)',av.b.clc,'mg/l'],
    ['Alcalinità',av.b.alk,'mg/l CaCO₃'],['Durezza',av.b.dur,'mg/l CaCO₃'],['Torbidità (max)',av.b.tur,'NTU'],
    ['Temperatura',av.b.tmp,'°C'],['Ac. cianurico (max)',av.b.cia,'mg/l']];

  // --- BUILD PROMPT FOR CLAUDE ---
  const buildPrompt=()=>{
    const r=d.risultati||{};
    const nCirc=r.nCirc||1;
    const Qprog_p=r.Qcirc||Qtot; // Q progetto per circuito
    const Tsel_p=r.Tsel||pr.T||d.tRic||5; // T della config selezionata in Fase 5
    const isCart=d.tipoFiltro==='cartuccia';
    const hasEle=d.acc&&d.acc.ele;
    const sup_p=d.L*d.W;const perim_p=2*(d.L+d.W);
    const supCirc_p=nCirc>1?sup_p/nCirc:sup_p;
    const hAcc_p=(d.acc&&d.acc.ris?PLC.ris:0)+(d.acc&&d.acc.ele?PLC.ele:0)+(d.acc&&d.acc.dos?PLC.dos:0)+(d.acc&&d.acc.uv?PLC.uv:0);
    const norme=d.tipoPisc==='Tipo 2'
      ?'UNI 10637:2024, UNI EN 13451-3:2022, UNI EN 16713-2, L.R. Toscana 8/2006, DPGR 54/R/2015'
      :'UNI EN 16582-1/2/3, UNI EN 16713-2:2016, UNI EN 13451-3:2022 (rif. prodotto)';

    // === DIMENSIONAMENTO CORRETTO (identico a Fase 5) ===
    // PASSO 1: Pompa fissa per Q progetto
    const nPompeCalc=d.tipoPisc==='Tipo 2'?2:1;
    const hTprog_p=r.hTotDef||r.hTot||0;
    const autoProg_p=autoSelFP(Qprog_p,d.tipoPisc,d.tipoFiltro,supCirc_p,nPompeCalc,hTprog_p);
    var _sc=d.risultati&&d.risultati.selComp;
    const sF=(_sc&&_sc.filtro)?_sc.filtro:autoProg_p.filtro;
    const sP=(_sc&&_sc.pompa)?_sc.pompa:autoProg_p.pompa;
    const nPompe=autoProg_p.nPompe||nPompeCalc;
    const auto=autoProg_p;

    // PASSO 2: Itera solo dimensionamento tubi per Q filtro pulito (appena lavato)
    let Qdim_p=autoProg_p.qClean||Qprog_p||Qtot||1;
    let dc_p=dc;
    if(sP&&Qdim_p>0){
      const hFiltPulito_p=isCart?PR.HF_C0:PR.HF_S0;
      const hFiltSporco_p=isCart?PR.HF_C:PR.HF_S;
      for(let it=0;it<4;it++){
        const ripIt=calcRip(Qdim_p,d.tipoPisc);
        dc_p=dimCirc(Qdim_p,ripIt.qSup,ripIt.qFondo,d.circ,d.tipoPisc,d.tt||d.tipoTubo,d.tipoSfioro,supCirc_p,d.costruz,d.noPF,d.ovNSki,d.ovNBocc,d.ovNPF,d.ovDSki,d.ovDPF,d.ovDBocc,Qdim_p,d.ovDC1,d.ovDC2,d.ovDC3,(Qdim_p&&QminTot_p?+(Qdim_p+QminTot_p)/2:undefined));
        const hCirc=calcHcircuito(Qdim_p,d.tipoPisc,d.circ,d.tt||d.tipoTubo,d.tipoFiltro,supCirc_p,d.tl,d.tr,d.qt,hAcc_p);
        const hClean_p=+(hCirc-hFiltSporco_p+hFiltPulito_p).toFixed(2);
        const newQcl=+pumpQatH(sP,Math.max(0,hClean_p)).toFixed(1);
        if(Math.abs(newQcl-Qdim_p)<0.3)break;
        Qdim_p=newQcl;
      }
    }
    const Qmax_p=Qdim_p;
    // Calcolo iterativo Qmin (filtro sporco (da pulire) per intersezione curva pompa/impianto
    let QminPerPompa_p=auto.qMin||0;
    if(sP){
      for(let it2=0;it2<6;it2++){
        const hSp_p=calcHcircuito(QminPerPompa_p,d.tipoPisc,d.circ,d.tt||d.tipoTubo,d.tipoFiltro,supCirc_p,d.tl,d.tr,d.qt,hAcc_p);
        const nQsp_p=+pumpQatH(sP,Math.max(0,hSp_p)).toFixed(2);
        if(Math.abs(nQsp_p-QminPerPompa_p)<0.05)break;
        QminPerPompa_p=nQsp_p;
      }
    }
    const nfEff_p=sF?(sF.nf||1):1;
    const QminTot_p=QminPerPompa_p*nfEff_p*nCirc;
    const Teff_p=QminTot_p>0?+(volTot/QminTot_p).toFixed(1):null;
    const hTot=hTprog_p; // per il testo del prompt

    // Ricalcola set accessori a Qmax
    const ripC=calcRip(Qmax_p,d.tipoPisc,d.noPF);
    const ripCirc=nCirc>1?{qSup:Qmax_p*(d.tipoPisc==='Tipo 2'?0.75:2/3),qFondo:Qmax_p*(d.tipoPisc==='Tipo 2'?0.25:1/3)}:ripC;
    const setAcc=selSetAccessori(d.tipoPisc,d.costruz,d.circ,Qmax_p,ripCirc,0,0,undefined,d.noPF);
    const sPF=d.noPF?null:((_sc&&_sc.pf)?_sc.pf:setAcc.pf);
    const sBP=(_sc&&_sc.bp)?_sc.bp:setAcc.bp;
    const sS=(_sc&&_sc.ski)?_sc.ski:setAcc.ski;
    const nPF_eff=d.noPF?0:(nCirc>1?(r.nPFperCirc||2):(dc_p.pf?dc_p.pf.n:(setAcc.nPF||2)));
    const nSki=nCirc>1?(r.nSkiPerCirc||2):(dc_p.ski?dc_p.ski.n:1);
    const nBoccPerCirc=nCirc>1?(r.nBoccPerCirc||3):(dc_p&&dc_p.bocc&&dc_p.bocc.n?dc_p.bocc.n:(r&&r.nBoccPerCirc)||3);

    // Arricchisci sF con dati dal catalogo se mancanti (selComp salva solo subset)
    function enrichFiltro(f){
      if(!f)return f;
      if(f.qpf&&f.vf)return f; // già completo
      // cerca nel catalogo
      var allF=[].concat(
        Object.entries(FC).reduce(function(a,e){return a.concat(e[1].map(function(x){return Object.assign({},x,{forn:e[0]});}));},[]),
        Object.entries(FS_P).reduce(function(a,e){return a.concat(e[1].map(function(x){return Object.assign({},x,{forn:e[0]});}));},[]),
        Object.entries(FS_U).reduce(function(a,e){return a.concat(e[1].map(function(x){return Object.assign({},x,{forn:e[0]});}));},[])
      );
      var found=allF.find(function(x){return x.c&&f.m&&x.m===f.m;});
      if(found){
        var nf=f.nf||1;
        var Qf=Qmax_p/nf;
        return Object.assign({},found,f,{
          qpf:f.qpf||+(Qf).toFixed(1),
          vf:f.vf||+(Qf/(found.sf||1)).toFixed(2)
        });
      }
      // fallback: calcola da sf se disponibile
      var nf=f.nf||1;
      var Qf=Qmax_p/nf;
      return Object.assign({},f,{
        qpf:f.qpf||+(Qf).toFixed(1),
        vf:f.vf||+(f.sf?Qf/f.sf:0).toFixed(2)
      });
    }
    function enrichPompa(p){
      if(!p)return p;
      if(p.q!==undefined)return p;
      // cerca nel catalogo
      var allP=[];
      Object.entries(C_PM).forEach(function(e){e[1].forEach(function(x){allP.push(Object.assign({},x,{forn:e[0]}));});});
      var found=allP.find(function(x){return x.m&&p.m&&x.m===p.m;});
      if(found)return Object.assign({},found,p);
      return Object.assign({},p,{q:p.q||p.qMax||0});
    }
    function enrichAccessori(a,catalogo){
      if(!a)return a;
      if(a.du!==undefined&&a.da!==undefined)return a;
      var allA=[];
      if(Array.isArray(catalogo)){allA=catalogo;}
      else{Object.entries(catalogo||{}).forEach(function(e){if(Array.isArray(e[1]))e[1].forEach(function(x){allA.push(Object.assign({},x,{forn:e[0]}));});});}
      var found=allA.find(function(x){return x.m&&a.m&&x.m===a.m;});
      if(found)return Object.assign({},found,a);
      return Object.assign({},a,{du:a.du||a.d||50,da:a.da||a.d||50});
    }
    const sF_full=enrichFiltro(sF);
    const sP_full=enrichPompa(sP);
    const sS_full=enrichAccessori(sS,C_SKI);
    const sBP_full=enrichAccessori(sBP,C_BP);

    // Aliases per il testo del prompt
    const hBase=+(hTot-hAcc_p).toFixed(2);
    const hAcc=hAcc_p;

    const tcLines=[];
    // Tratti: legge r.tc (salvati Fase3) — Q esercizio corrette, di PN10 per C/PF
    const tcSaved=r.tc||{};
    const labelMap={
      A:d.circ==='skimmer'?'Ramo skimmer -> collettore asp.':'Linea vasca compenso -> collettore asp.',
      PF:'Linea prese fondo -> collettore asp. (DN dimensionato a Q max pompa per sicurezza)',
      C:'Collettore asp. -> Pompa (locale tecnico)',
      M:'Collettore man. -> Bocchetta (ramo singolo)'};
    const _nSkiSafe=Math.max(1,nSki);
    const _nBoccSafe=Math.max(1,nBoccPerCirc);
    const _Qprog=Qprog_p||Qtot;
    const _qA_prog=(_Qprog*(d.tipoPisc==='Tipo 2'?0.75:2/3))/_nSkiSafe;
    const _qFondo_prog=_Qprog*(d.tipoPisc==='Tipo 2'?0.25:1/3);
    const QmaxSafe=Math.max(1,Qmax_p||Qtot);
    const _qdnMap={A:_qA_prog,PF:QmaxSafe,C:QmaxSafe,M:_Qprog/_nBoccSafe};
    for(const k of (d.noPF?['A','C','M']:['A','PF','C','M'])){
      const tc_k=tcSaved[k];
      const rc=d.tr[k]||{};
      const L=tlTot(d.tl,k);
      const raccStr=[];
      if(rc.c90)raccStr.push(rc.c90+'x curva 90deg');
      if(rc.c45)raccStr.push(rc.c45+'x curva 45deg');
      if(rc.vs)raccStr.push(rc.vs+'x valvola sfera');
      if(rc.nr)raccStr.push(rc.nr+'x non ritorno');
      if(rc.td)raccStr.push(rc.td+'x tee deriv.');
      if(tc_k&&tc_k.dn){
        const lq=typeof tc_k.lq==='number'?tc_k.lq:calcLeq(tc_k.dn,rc);
        const Qdn_k=typeof tc_k.Qdn==='number'?tc_k.Qdn:_qdnMap[k];
        tcLines.push('  '+k+' - '+labelMap[k]+'\n    D.'+tc_k.dn+' | L tubo: '+L+'m | Raccordi: '+(raccStr.join(', ')||'nessuno')+' | Leq raccordi: '+lq.toFixed(1)+'m | L equiv. totale: '+(L+lq).toFixed(1)+'m\n    Q calcolo perdite: '+tc_k.Q.toFixed(1)+' m3/h | Q dim. DN: '+Qdn_k.toFixed(1)+' m3/h | v: '+tc_k.vEx+' m/s | J: '+tc_k.jEx+' mm/m | Perdita tratto: '+tc_k.hd.toFixed(3)+' mca');
      }else{
        const ttK=(k==='C'||k==='PF')?'pn10':(d.tt&&d.tt[k]?d.tt[k]:d.tipoTubo);
        const Qdn_fb=_qdnMap[k]||1;
        const Qhd_fb=(k==='A'?_qA_prog:k==='PF'?_qFondo_prog:k==='C'?QmaxSafe:_Qprog/_nBoccSafe);
        const dn_fb=selDN(Qdn_fb,k==='M'?'man':'asp',ttK,d.tipoPisc,k==='A'?PR.DN_MIN_SKI:k==='M'?PR.DN_MIN_BOCC:k==='PF'?PR.DN_MIN_PF:0);
        if(!dn_fb||!dn_fb.dn)continue;
        const lq_fb=calcLeq(dn_fb.dn,rc);
        const hd_fb=calcHd(Qhd_fb,dn_fb.di,L+lq_fb);
        const v_fb=+(Qhd_fb/3600/(Math.PI*dn_fb.di*dn_fb.di/4)).toFixed(3);
        const j_fb=+(hzJ(Qhd_fb,dn_fb.di)*1000).toFixed(1);
        tcLines.push('  '+k+' - '+labelMap[k]+'\n    D.'+dn_fb.dn+' | L tubo: '+L+'m | Raccordi: '+(raccStr.join(', ')||'nessuno')+' | Leq raccordi: '+lq_fb.toFixed(1)+'m | L equiv. totale: '+(L+lq_fb).toFixed(1)+'m\n    Q calcolo perdite: '+Qhd_fb.toFixed(1)+' m3/h | Q dim. DN: '+Qdn_fb.toFixed(1)+' m3/h | v: '+v_fb+' m/s | J: '+j_fb+' mm/m | Perdita tratto: '+hd_fb.toFixed(3)+' mca');
      }
    }
    // Prevalenza scomposta
    const hF=isCart?PR.HF_C:PR.HF_S;
    const hF0=isCart?PR.HF_C0:PR.HF_S0;
    const hVL=isCart?0:PR.H_VL;
    let hStat=0;if(d.circ==='sfioro')hStat=Math.max(0,(d.qt.livVasca||0)-(d.qt.fondoCompenso||0));

    // Profondita vasca
    const segDesc=d.seg.map(function(s,i){return '  Segmento '+(i+1)+': '+s.lp+'% della vasca, prof. da '+s.da+'m a '+s.a+'m';}).join('\n');

    // Elementi speciali

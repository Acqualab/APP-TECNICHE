<html lang="it">
<head>

<title>Acqualab — Dimensionamento Piscina v14</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--c1:#1A5057;--c2:#f2f7f7;--c3:#c8dfe1;--gn:#27ae60;--rd:#e74c3c;--bl:#1a7a8a;--or:#e67e22;--tx:#1a2e30;--r:10px}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:'Avenir Next','Segoe UI',system-ui,sans-serif;background:var(--c2);color:var(--tx);line-height:1.55}
header{background:linear-gradient(135deg,#1A5057,#2E7D7D);color:#fff;padding:16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
header h1{font-size:1.1rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
header .sub{font-size:.65rem;opacity:.7;margin-top:3px;line-height:1.4}
.app{max-width:920px;margin:0 auto;padding:10px 8px 60px}
.steps{display:flex;gap:3px;margin:12px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.steps::-webkit-scrollbar{display:none}
.stp{flex:1;min-width:48px;padding:8px 2px 6px;text-align:center;font-size:.55rem;font-weight:700;border-radius:8px;background:#fff;color:#aaa;border:2px solid transparent;cursor:default;line-height:1.3}
.stp.on{background:var(--c1);color:#fff;border-color:var(--c1)}.stp.ok{background:var(--gn);color:#fff;cursor:pointer;border-color:var(--gn)}
.stp b{display:block;font-size:1.4em}
.cd{background:#fff;border-radius:var(--r);box-shadow:0 1px 6px rgba(0,0,0,.08);padding:14px;margin-bottom:10px}
.cd h2{font-size:.92rem;color:var(--c1);border-bottom:2px solid var(--c3);padding-bottom:5px;margin-bottom:8px;font-weight:700}
.cd h3{font-size:.8rem;color:#5a4d40;margin:8px 0 4px;font-weight:700}
label{display:block;font-size:.72rem;font-weight:600;margin-bottom:2px;color:#5a4a3c}
.hn{font-size:.62rem;color:#999;font-weight:400;margin-left:2px}
input[type=number],input[type=text],select{width:100%;padding:8px;border:1.5px solid var(--c3);border-radius:6px;font-size:.85rem;background:var(--c2);color:var(--tx);-webkit-appearance:none}
input:focus,select:focus{border-color:var(--c1);outline:none;box-shadow:0 0 0 3px rgba(26,80,87,.15)}
.rw{display:flex;gap:8px;flex-wrap:wrap}.rw>*{flex:1;min-width:80px}
.tg{display:inline-flex;border-radius:6px;overflow:hidden;border:1.5px solid var(--c3)}
.tg button{padding:8px 10px;font-size:.7rem;border:none;background:#fff;color:var(--tx);cursor:pointer;font-weight:600;white-space:nowrap}
.tg button.a{background:var(--c1);color:#fff}
.ck{display:flex;align-items:flex-start;gap:6px;margin:4px 0;font-size:.78rem;line-height:1.4}
.ck input[type=checkbox]{width:18px;height:18px;accent-color:var(--gn);flex-shrink:0;margin-top:1px}
.bn{display:block;width:100%;padding:14px;border:none;border-radius:var(--r);font-size:.92rem;font-weight:700;cursor:pointer;text-align:center;margin-top:8px}
.bn-go{background:var(--gn);color:#fff}.bn-go:disabled{opacity:.45;cursor:not-allowed}
.bn-bk{background:transparent;color:var(--tx);border:1.5px solid var(--c3);margin-top:5px}
.bn-sm{display:inline-block;padding:5px 10px;font-size:.7rem;border:1px solid var(--c3);border-radius:5px;cursor:pointer;background:var(--c2)}
.bn-rm{color:var(--rd);border-color:var(--rd)}
.bg{display:inline-block;padding:2px 7px;border-radius:5px;font-size:.64rem;font-weight:700}
.bg-ok{background:#eafaf1;color:var(--gn)}.bg-no{background:#fdedeb;color:var(--rd)}
.fn{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.6rem;font-weight:700;margin-left:2px}
.fn-t{background:#d6eaf8;color:#1a5276}.fn-i{background:#fadbd8;color:#922b21}.fn-p{background:#e8daef;color:#6c3483}
.tc{color:var(--gn);font-weight:800;font-family:'Courier New',monospace}
table.t{width:100%;border-collapse:collapse;font-size:.74rem;margin:5px 0}
table.t th{background:var(--c3);color:var(--c1);padding:5px 6px;text-align:left;font-weight:700;font-size:.68rem}
table.t td{padding:4px 6px;border-bottom:1px solid #f0ebe3}
table.t .r{text-align:right;font-weight:600;white-space:nowrap}
.tt td{background:var(--c3);font-weight:700;padding:6px!important}
.dl{font-size:.78rem;margin:2px 0}.dl b{font-weight:700}
.wr{color:var(--rd);font-weight:600;font-size:.78rem;margin:4px 0;padding:6px 10px;background:#fdf2f0;border-radius:6px;border-left:3px solid var(--rd)}
.inf{color:var(--bl);font-size:.74rem;margin:4px 0;padding:6px 10px;background:#eaf2fa;border-radius:6px;border-left:3px solid var(--bl)}
.nb{background:#f5f0e8;border-left:4px solid var(--c1);padding:10px 12px;margin:8px 0;font-size:.76rem;border-radius:0 var(--r) var(--r) 0;line-height:1.55}
.ls{background:var(--c3);border-radius:var(--r);padding:10px;margin:6px 0}
.ls h4{font-size:.78rem;color:var(--gn);margin-bottom:4px;font-weight:700}
.seg{background:var(--c2);padding:8px;border-radius:6px;margin-bottom:4px;border:1px solid var(--c3)}
.zt{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.62rem;font-weight:700}
.zF{background:#fadbd8;color:#922b21}.zE{background:#fdebd0;color:#ca6f1e}.zD{background:#fcf3cf;color:#b7950b}.zC{background:#d5f5e3;color:#1e8449}
.ex{border:2px solid var(--gn);border-radius:var(--r);overflow:hidden;margin:8px 0}
.ex-h{background:var(--gn);color:#fff;padding:8px 12px;font-weight:700;font-size:.82rem}
.ex-b{padding:10px 12px}
.pr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0ebe3;font-size:.76rem;flex-wrap:wrap}
.dn{display:inline-block;padding:3px 9px;border-radius:5px;font-weight:700;font-size:.76rem;white-space:nowrap;color:#fff}
.dn-a{background:var(--c1)}.dn-c{background:var(--bl)}.dn-s{background:var(--or)}
.co{cursor:pointer;padding:8px 10px;border-bottom:1px solid var(--c3)}
.co:hover{background:#faf8f2}.co.sel{background:#edf8f0;border-left:3px solid var(--gn)}
.ct{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.62rem;font-weight:700;margin-left:4px;background:var(--gn);color:#fff}
@media(max-width:600px){html{font-size:14px}.rw>*{min-width:65px}.cd{padding:10px}.steps{gap:2px}.stp{min-width:42px;padding:5px 1px 4px;font-size:.48rem}table.t{font-size:.68rem}table.t th,table.t td{padding:3px 4px}.ex-b{padding:8px}}
</style>

// Interpolazione curva pompa: Q erogata a prevalenza H
function pumpQatH(pump,H){
  // Curva come array [[Q0,H0],[Q1,H1],...] con Q crescente e H decrescente
  // Dato H, trova Q per interpolazione inversa
  const c=pump.qh;if(!c||c.length<2)return pump.q||pump.qMax||0;
  // Se H >= H0 (massima prevalenza a Q=0) → pompa non eroga
  if(H>=c[0][1])return 0;
  // Se H <= Hmin (ultima prevalenza) → Q massima
  if(H<=c[c.length-1][1])return c[c.length-1][0];
  // Cerca il segmento dove H cade tra H[i] e H[i+1] (H decresce)
  for(let i=0;i<c.length-1;i++){
    const H1=c[i][1],H2=c[i+1][1];
    const Q1=c[i][0],Q2=c[i+1][0];
    if(H<=H1&&H>=H2){
      const t=(H1-H)/(H1-H2);
      return Q1+(Q2-Q1)*t;
    }
  }
  return 0;
}

// MOTORE DI CALCOLO v8
// PROPRIETÀ CONSISTENTI: ripartizione → {qSup, qFondo, pSup, pFondo, note}
// dimCirc riceve queste ESATTE proprietà
// =====================================================================
const PI=Math.PI;
function sez(d){return PI*d*d/4;}
function hzJ(Qm3h,Dm){const q=Qm3h/3600;return 10.67*Math.pow(q,1.852)/(Math.pow(150,1.852)*Math.pow(Dm,4.87));}

// =====================================================================
// DIMENSIONAMENTO DN — APPROCCIO INGEGNERISTICO CORRETTO
// 1. Criterio primario: perdite di carico J ≤ jmax (40/70 mm/m)
// 2. Verifica sicurezza: velocità v ≤ vmax (1.7/2.5 m/s)
// 3. Warning domestica: v > target best practice (1.5/2.0 m/s)
// Il DN si sceglie partendo da J; la v è controllo, non criterio.
// Se J ok ma v ko → tratto corto/singolarità → segnala errore
// Se J ko → DN troppo piccolo per questa portata
// =====================================================================
function selDN(Qm3h,tipo,tipoTuboIn,tipoPisc,dnMin){
  var tipoTubo=tipoTuboIn;
  if(tipoTuboIn&&typeof tipoTuboIn==='object'){tipoTubo=(tipo==='asp'?(tipoTuboIn.A||tipoTuboIn.PF):(tipoTuboIn.M||tipoTuboIn.C))||'flex';}
  const tb=tipoTubo==='pn10'?T10:(tipoTubo==='flex'?TFL:T16);
  const jm=tipo==='asp'?PR.J_A:PR.J_M;
  const isT2=tipoPisc==='Tipo 2';
  const vm=tipo==='asp'?(isT2?PR.V_A_T2:PR.V_A_DOM):(isT2?PR.V_M_T2:PR.V_M_DOM);
  const vTgt=(!isT2)?(tipo==='asp'?PR.V_A_DOM_TGT:PR.V_M_DOM_TGT):null;
  const q=Qm3h/3600;
  // Processo iterativo: J e v sono vincoli CONTEMPORANEI
  // Si scorre dal DN più piccolo al più grande finché ENTRAMBI sono rispettati
  for(const t of tb){
    if(dnMin&&t.dn<dnMin)continue;
    const v=q/sez(t.di);const j=hzJ(Qm3h,t.di);
    // Criterio 1: perdite di carico — se J troppo alto, DN troppo piccolo
    if(j>jm)continue;
    // Criterio 2: velocità di sicurezza — se v troppo alta, D. ancora insufficiente
    if(v>vm)continue;
    // ENTRAMBI i vincoli rispettati → DN corretto
    // Criterio 3: target best practice domestica (warning, non bloccante)
    const vWarn=vTgt&&v>vTgt;
    const warns=[];
    if(vWarn)warns.push('v='+v.toFixed(2)+' m/s > target best practice '+vTgt+' m/s (accettabile ma non ottimale)');
    return{dn:t.dn,di:t.di,v:+v.toFixed(3),j:+(j*1000).toFixed(1),ok:true,jOk:true,
      vWarn:!!vWarn,warns,metodo:'J='+((j*1000).toFixed(1))+'mm/m ≤ '+(jm*1000)+'mm/m · v='+v.toFixed(2)+' ≤ '+vm};
  }
  // Nessun DN rispetta entrambi: prendi il più grande e segnala
  const t=tb[tb.length-1];const v=q/sez(t.di);const j=hzJ(Qm3h,t.di);
  const warns=[];
  if(j>jm)warns.push('J='+(j*1000).toFixed(1)+' mm/m > '+(jm*1000)+' mm/m — D. max superato per perdite');
  if(v>vm)warns.push('v='+v.toFixed(2)+' m/s > soglia progettuale '+vm+' m/s (criterio Acqualab)');
  return{dn:t.dn,di:t.di,v:+v.toFixed(3),j:+(j*1000).toFixed(1),ok:false,jOk:j<=jm,
    vWarn:true,warns,warn:'D. max superato'};
}

// DN collettore: v bassa + rapporto sezioni
function selDNcoll(Qm3h,tipo,tipoTuboIn,dnUscita,tipoPisc,nUscite){
  // Metodo ProfessioneAcqua: S_coll > Σ(sezioni USCENTI) × 1.5
  // Nessun vincolo di velocità — solo criterio sezione
  var tipoTubo=tipoTuboIn;
  if(tipoTuboIn&&typeof tipoTuboIn==='object'){tipoTubo=(tipo==='asp'?tipoTuboIn.A:(tipoTuboIn.M||tipoTuboIn.C))||'flex';}
  const tb=tipoTubo==='pn10'?T10:(tipoTubo==='flex'?TFL:T16);
  var nU=nUscite||1;
  const tUsc=T10.find(t=>t.dn===dnUscita)||TFL.find(t=>t.dn===dnUscita)||T16.find(t=>t.dn===dnUscita)||tb[0];
  const sMin=sez(tUsc.di)*nU*1.5;
  const q=Qm3h/3600;
  for(const t of tb){
    if(sez(t.di)>sMin){
      const v=+(q/sez(t.di)).toFixed(2);
      const rap=+(sez(t.di)/(sez(tUsc.di)*nU)).toFixed(2);
      return{dn:t.dn,di:t.di,v,ok:true,rap};
    }
  }
  const t=tb[tb.length-1];const v=+(q/sez(t.di)).toFixed(2);
  return{dn:t.dn,di:t.di,v,ok:false,rap:+(sez(t.di)/(sez(tUsc.di)*nU)).toFixed(2),warn:'D. max'};
}

// Lunghezza equivalente raccordi
function calcLeq(dn,racc){const e=LEQ[dn]||LEQ[110];return(racc.c90||0)*e.c90+(racc.c45||0)*e.c45+(racc.vs||0)*e.vs+(racc.nr||0)*e.nr+(racc.td||0)*e.td;}

// Perdita di carico tratto (mca)
function calcHd(Qm3h,Dm,Lm){return hzJ(Qm3h,Dm)*Lm;}

// N. skimmer: Tipo2 = 1/20m² (UNI 10637), Domestica = 1/25m² (regola progettuale)
function nSkimmer(sup,tp){return tp==='Tipo 2'?Math.max(1,Math.ceil(sup/20)):Math.max(1,Math.ceil(sup/25));}

// N. prese fondo: minimo 2 in parallelo, aumenta se Q fondo > 2×16
// SICUREZZA: ogni presa deve reggere 100% Q_pompa con 1 ostruita → N≥2 sempre
function nPreseFondo(qFondo){return Math.max(2,Math.ceil(qFondo/16));}

// VERIFICA SICUREZZA ASPIRAZIONI SOMMERSE
// Tipo 2: UNI EN 13451-3:2022 (norma primaria aspirazioni)
// Domestica: UNI EN 16582 + UNI EN 16713 (norme primarie), EN 13451-3 come riferimento prodotto
// Q_verifica = Q_totale_pompa (caso peggiore: tutte le altre asp. chiuse)
// Con 1 presa ostruita: Q_per_presa = Q_pompa / (N-1)
// Q_per_presa deve essere ≤ q_max dichiarata dal costruttore (che certifica v_griglia ≤ 0,5 m/s)
function verificaSicurezzaPF(nPrese, qMaxPresa, Qpompa, tipoPisc){
  const res={ok:true,err:[],warn:[],info:[]};
  // 1. Ridondanza: SEMPRE minimo 2 prese — regola progettuale vincolante
  if(nPrese<2){
    res.ok=false;
    if(tipoPisc==='Tipo 2'){
      res.err.push('Tipo 2: minimo 2 prese fondo SEMPRE (UNI EN 13451-3:2022 — aspirazioni singole non ammesse)');
    }else{
      res.err.push('Domestica: minimo 2 prese fondo in parallelo OBBLIGATORIO — regola progettuale vincolante per sicurezza anti-intrappolamento (rif. UNI EN 16582/16713). Configurazione con presa singola NON AMMESSA.');
    }
  }
  // 2. Portata con 1 ostruita
  const nAttive=Math.max(1,nPrese-1);
  const qPerPresa=Qpompa/nAttive;
  if(qPerPresa>qMaxPresa){
    res.ok=false;
    res.err.push(`SICUREZZA: con 1 presa ostruita, Q per presa = ${qPerPresa.toFixed(1)} m³/h > Q max griglia ${qMaxPresa} m³/h (v griglia > 0,5 m/s). Servono più prese o griglie più grandi.`);
  }else{
    res.info.push(`Con 1 presa ostruita: Q per presa = ${qPerPresa.toFixed(1)} m³/h ≤ Q max griglia ${qMaxPresa} m³/h ✓`);
  }
  // 3. Verifica v griglia (stima): v = 0.5 × Q_eff/Q_max
  const vStima=qPerPresa>0?+(0.5*qPerPresa/qMaxPresa).toFixed(2):0;
  res.vStima=vStima;
  res.qPerPresa=+qPerPresa.toFixed(1);
  res.nAttive=nAttive;
  // 4. DN tubazione: deve reggere Q_pompa totale
  res.info.push(`D. tubazione prese fondo: verificata a Q = ${Qpompa.toFixed(1)} m³/h (portata totale pompa, non quota fondo)`);
  return res;
}

// N. minimo prese fondo dalla verifica sicurezza
// Dato Q_pompa e q_max_griglia, calcola N minimo tale che Q_pompa/(N-1) ≤ q_max
function nPreseFondoSicurezza(Qpompa, qMaxGriglia){
  if(qMaxGriglia<=0)return 3;
  // Q_pompa/(N-1) ≤ qMax → N-1 ≥ Q_pompa/qMax → N ≥ Q_pompa/qMax + 1
  return Math.max(2, Math.ceil(Qpompa/qMaxGriglia)+1);
}

// =====================================================================
// DIMENSIONAMENTO CIRCOLAZIONE COMPLETO
// Schema Acqualab: 1 collettore asp. unico, 1 collettore man. unico,
// ogni linea con valvola, prese fondo in parallelo nella vasca
// =====================================================================
function dimCirc(Qtot,qSup,qFondo,circ,tipoPisc,tipoTubo,tipoSfioro,sup,costruz,noPF,ovNSki,ovNBocc,ovNPF,ovDSki,ovDPF,ovDBocc,Qdim,ovDC1,ovDC2,ovDC3,Qmed){
  const Qdimensionamento=Qdim||Qtot; // Q max pompa a filtro pulito (appena lavato) per dimensionamento bocchette
  const R={};
  // --- ASPIRAZIONE SUPERFICIE ---
  if(circ==='skimmer'){
    const nS=ovNSki?+ovNSki:nSkimmer(sup,tipoPisc);
    const qPerSki=qSup/nS;
    // DN ramo skimmer: usa Q media di esercizio (non Qmax)
    const qSkiDN=Qmed?((Qmed*(tipoPisc==='Tipo 2'?0.75:2/3))/nS):qPerSki;
    const _getDN=(dn)=>{const tb=tipoTubo==='flex'?TFL:T16;return tb.find(t=>t.dn===+dn)||{dn:+dn,di:.055};};
    const dnR=ovDSki?_getDN(ovDSki):selDN(qSkiDN,'asp',tipoTubo,tipoPisc,PR.DN_MIN_SKI);
    R.ski={n:nS,qTot:+qSup.toFixed(1),qSup:+qSup.toFixed(1),qEa:+qPerSki.toFixed(1),dnRamo:dnR,dnUsc:63};
  }else{
    const mg=tipoSfioro==='infinity'?PR.MARG_P_I:PR.MARG_P_R;
    const Qp=qSup*mg;
    const pil=dimPilette(Qp);
    const coll=dimScarico(Qp);
    R.sfi={n:pil.np,qSup:+qSup.toFixed(1),qProg:+Qp.toFixed(1),mg:Math.round((mg-1)*100),
      dnPil:pil.dn,batt:pil.batt,collScar:coll};
    // Aspirazione dalla vasca di compenso → collettore asp.
    // Porta tutta la portata di superficie (qSup) — linea in aspirazione (la pompa crea depressione)
    const dnAspComp=selDN(qSup,'asp',tipoTubo,tipoPisc,PR.DN_MIN_PF);
    R.aspCompenso={q:+qSup.toFixed(1),dn:dnAspComp,
      note:'Linea aspirazione compenso → collettore asp. (in aspirazione, porta Q superficie = '+qSup.toFixed(1)+' m³/h)'};
  }
  // --- PRESE DI FONDO ---
  if(noPF){
    // Prese di fondo escluse: nessun componente, nessuna linea
    R.pf=null;
  }else{
  const pfDisp=filtraPF(tipoPisc,costruz||'calcestruzzo');
  let bestPFopt=null;
  for(const pf of pfDisp){
    const n=Math.max(2, nPreseFondoSicurezza(Qdimensionamento,pf.q), nPreseFondo(qFondo));
    const qpp=Qdimensionamento/(Math.max(1,n-1));
    if(qpp<=pf.q){
      const ct=(pf.p||9999)*n;
      if(!bestPFopt||(pf.mat==='ABS'&&bestPFopt.mat!=='ABS')||(pf.mat===bestPFopt.mat&&ct<bestPFopt.ct))
        bestPFopt={q:pf.q,n,ct,mat:pf.mat,qpp:+qpp.toFixed(1)};
    }
  }
  const qMaxGrigliaTipica=bestPFopt?bestPFopt.q:(tipoPisc==='Tipo 2'?16:15);
  const nPF_nominale=nPreseFondo(qFondo);
  const nPF_sicurezza=nPreseFondoSicurezza(Qdimensionamento,qMaxGrigliaTipica);
  const nPF=ovNPF?Math.max(2,+ovNPF):bestPFopt?bestPFopt.n:Math.max(nPF_nominale,nPF_sicurezza);
  // DN tubazione PF: PN10, dimensionato a Qdimensionamento (Q max pompa, caso peggiore sicurezza)
  const dnPF=selDN(Qdimensionamento,'asp','pn10',tipoPisc,PR.DN_MIN_PF);
  const qRamoPF=nPF>0?qFondo/nPF:qFondo;
  const _getDNasp=(dn)=>{const tb=T10;return tb.find(t=>t.dn===+dn)||{dn:+dn,di:.0444};};
  const dnRamoPF=ovDPF?{..._getDNasp(ovDPF),v:+((Qdimensionamento/3600)/sez(_getDNasp(ovDPF).di)).toFixed(3),ok:true}:selDN(Qdimensionamento,'asp','pn10',tipoPisc,PR.DN_MIN_PF);
  // Verifica sicurezza
  const pfSic=verificaSicurezzaPF(nPF,qMaxGrigliaTipica,Qdimensionamento,tipoPisc);
  R.pf={n:nPF,nNom:nPF_nominale,nSic:nPF_sicurezza,
    qNom:+qFondo.toFixed(1),qNomEa:+(qFondo/nPF).toFixed(1),
    qVerifica:+Qdimensionamento.toFixed(1),qVerEa:pfSic.qPerPresa,
    qRamoPF:+qRamoPF.toFixed(1),dnRamoPF,
    dnLinea:dnPF,dnUsc:50,
    dist:tipoPisc==='Tipo 2'?'≥ 2m tra i bordi (UNI EN 13451-3)':'≥ 1m tra i bordi (piscine private)',distPareti:'≥ 1m dalle pareti verticali',
    sicurezza:pfSic,qMaxGriglia:qMaxGrigliaTipica};
  } // end else noPF
  // --- COLLETTORE ASPIRAZIONE UNICO ---
  // Sfioro: 3 linee con ruoli e priorità diversi:
  //   1. Compenso (primaria, porta qSup in regime standard)
  //   2. Prese fondo (primaria, porta qFondo in regime standard) — se presenti
  //   3. Aspirafango (alternativa, parallelo a compenso, uso temporaneo senza bagnanti)
  // Skimmer: N skimmer + 1 linea PF (se presente)
  const nLineeAsp=circ==='skimmer'?(R.ski.n+(noPF?0:1)):(noPF?2:3);
  const dnRamoMaxPF=noPF?null:(R.pf?R.pf.dnLinea.dn:null);
  const dnRamoMaxSki=circ==='skimmer'?R.ski.dnRamo.dn:null;
  // Collettore asp deve reggere il ramo più grande tra tutti i rami entranti
  const dnRamoMax=circ==='skimmer'
    ? (dnRamoMaxPF&&dnRamoMaxPF>=(dnRamoMaxSki||0)?dnRamoMaxPF:dnRamoMaxSki)
    : (dnRamoMaxPF||selDN(Qtot,'asp',tipoTubo,tipoPisc,PR.DN_MIN_PF).dn);
  // Collettore asp: 1 uscita verso pompa (tratto C1, PN10)
  // DN uscita = DN del tratto C1 (auto o override)
  const dnUscitaAsp=R.trC1?R.trC1.dn:75;
  const collAsp=selDNcoll(Qtot,'asp','pn10',dnUscitaAsp,tipoPisc,1);
  R.collAsp={dn:collAsp,nLinee:nLineeAsp,qTot:+Qtot.toFixed(1)};
  // --- ASPIRAFANGO (solo sfioro) ---
  // Presa a parete con valvola, collegata al collettore asp.
  // NON guida il dimensionamento: è condizione di esercizio alternativa.
  // Scenario realistico: aspirafango lavora IN PARALLELO alla linea compenso.
  // La pompa aspira da entrambe → la Q si ripartisce tra compenso e aspirafango.
  // Q progetto aspirafango ≈ Q fondo (quota ragionevole per pulizia efficace).
  // Limiti v più tolleranti: uso temporaneo, presidiato, senza bagnanti in vasca.
  if(circ!=='skimmer'){
    const qAF=noPF?Qtot*0.33:qFondo; // Q progetto aspirafango ≈ quota fondo (parallelo a compenso che porta qSup)
    const vmAF=2.5; // v max aspirafango: uso temporaneo presidiato → limite mandata (più tollerante di 1.7 asp.)
    const dnAF=selDN(qAF,'asp',tipoTubo,tipoPisc,PR.DN_MIN_PF);
    const vAF=(qAF/3600)/sez(dnAF.di);
    const afOk=vAF<=vmAF&&dnAF.ok;
    const afWarns=[];
    if(vAF>vmAF)afWarns.push('v='+vAF.toFixed(2)+' m/s > '+vmAF+' m/s — DN insufficiente per aspirafango');
    if(!dnAF.ok)afWarns.push('D. aspirafango insufficiente per Q='+qAF.toFixed(1)+' m³/h');
    R.aspFango={dn:dnAF,v:+vAF.toFixed(2),q:+qAF.toFixed(1),qTotPompa:+Qtot.toFixed(1),vmAF,ok:afOk,warns:afWarns,
      note:'Presa a parete D.'+dnAF.dn+' con valvola a sfera — in parallelo alla linea compenso — uso temporaneo presidiato senza bagnanti'};
  }
  // --- BOCCHETTE ---
  // nBocc e DN ramo dimensionati a Qtot (portata esercizio) — non alla portata max pompa
  // nBocc: dimensionato a Qdimensionamento (Qmax pompa) per garantire Q/bocc ≤ Q_MAX_BOCC
  const nB=ovNBocc?Math.max(2,+ovNBocc):Math.max(2,Math.ceil(Qdimensionamento/PR.Q_MAX_BOCC));
  // DN ramo bocchette: usa Q media di esercizio (non Qmax)
  const qBmed=Qmed?Qmed/nB:Qtot/nB;
  const qB=qBmed;       // portata media per DN ramo bocchette
  const _getDNman=(dn)=>{const tb=tipoTubo==='flex'?TFL:T16;return tb.find(t=>t.dn===+dn)||{dn:+dn,di:.043};};
  const dnB=ovDBocc?_getDNman(ovDBocc):selDN(qB,'man',tipoTubo,tipoPisc,PR.DN_MIN_BOCC);
  R.bocc={n:nB,qTot:+Qtot.toFixed(1),qEa:+qB.toFixed(1),qEaMax:+(Qdimensionamento/nB).toFixed(1),dnRamo:dnB,dnAtt:50};
  // --- COLLETTORE MANDATA UNICO ---
  // Dimensionato a Qtot (portata esercizio)
  const collMan=selDNcoll(Qtot,'man','pn10',dnB.dn,tipoPisc,nB);
  R.collMan={dn:collMan,nLinee:nB,qTot:+Qtot.toFixed(1)};
  // --- TRATTI LOCALE TECNICO (PN10) — dimensionati a Qdimensionamento (Q max pompa) ---
  R.trC1=ovDC1?{...(T10.find(t=>t.dn===+ovDC1)||T10[3]),ok:true}:selDN(Qdimensionamento,'asp','pn10',tipoPisc);
  R.trC2=ovDC2?{...(T10.find(t=>t.dn===+ovDC2)||T10[2]),ok:true}:selDN(Qdimensionamento,'man','pn10',tipoPisc);
  R.trC3=ovDC3?{...(T10.find(t=>t.dn===+ovDC3)||T10[2]),ok:true}:selDN(Qdimensionamento,'man','pn10',tipoPisc);
  R.trPompa=R.trC1;
  return R;
}

// Pilette scarico canaletta — orifizio: Q=Cd×A×√(2gh), battente≤30mm
// Privilegia DN grandi con poche pilette
function dimPilette(Qm3h){
  const q=Qm3h/3600;
  let best=null;
  // Itera dai DN PIÙ GRANDI ai più piccoli → privilegia meno pilette
  for(let i=TSC.length-1;i>=0;i--){
    const t=TSC[i];
    const a=sez(t.di);
    const qp=PR.CD*a*Math.sqrt(2*9.81*PR.BATT);
    const np=Math.ceil(q/qp);
    const hr=Math.pow((q/np)/(PR.CD*a),2)/(2*9.81);
    if(hr<=PR.BATT){best={dn:t.dn,np,qp:+(qp*3600).toFixed(1),batt:+(hr*1000).toFixed(0)};}
    else break; // DN più piccoli avranno battente ancora peggiore
  }
  if(!best){
    // Fallback: DN più grande con tante pilette
    const t=TSC[TSC.length-1];const a=sez(t.di);
    const qp=PR.CD*a*Math.sqrt(2*9.81*PR.BATT);
    best={dn:t.dn,np:Math.ceil(q/qp),qp:+(qp*3600).toFixed(1),batt:30};
  }
  return best;
}

// Collettore scarico pilette → compenso — Manning a gravità
function dimScarico(Qm3h){
  const q=Qm3h/3600;
  for(const t of TSC){
    const a50=PI/8*t.di*t.di;
    const p50=PI*t.di/2;
    const Rh=a50/p50;
    const qm=(1/PR.MN)*a50*Math.pow(Rh,2/3)*Math.pow(PR.PEND,0.5);
    if(qm>=q)return{dn:t.dn,ok:true,qMax:+(qm*3600).toFixed(1)};
  }
  return{dn:TSC[TSC.length-1].dn,ok:false,warn:'Doppio collettore necessario'};
}

// =====================================================================
// ELEMENTI SPECIALI — volumi per zona di profondità
// =====================================================================
// Assegna un volume a una zona in base alla profondità media
function volToZone(prof,vol){
  const z=ZP3.find(zn=>prof<=zn.mx)||ZP3[3];
  return{z:z.z,vol};
}
// Distribuisce un volume su zone per profondità variabile (da prof1 a prof2)
function volToZonesRange(prof1,prof2,vol){
  const d1=Math.min(prof1,prof2),d2=Math.max(prof1,prof2);
  if(d2-d1<0.001)return[volToZone(d1,vol)];
  const res=[];
  let cuts=[d1];for(const b of BP)if(b>d1&&b<d2)cuts.push(b);cuts.push(d2);
  for(let i=0;i<cuts.length-1;i++){
    const dm=(cuts[i]+cuts[i+1])/2;
    const fr=(cuts[i+1]-cuts[i])/(d2-d1);
    const z=ZP3.find(zn=>dm<=zn.mx)||ZP3[3];
    res.push({z:z.z,vol:vol*fr});
  }
  return res;
}

// Scala: N gradini, altezza pedata (m), larghezza orma (m), larghezza scala (m)
// Ogni gradino ha prof_acqua = somma altezze dei gradini sovrastanti + altezza/2
// Volume acqua su ogni gradino = larghezza_scala × pedata × profondità_acqua_sul_piano
// offsetPelo: distanza tra bordo vasca e pelo acqua (positivo = pelo sotto il bordo)
// es: bordo=0, pelo=-0.10 → offset=0.10 → il primo gradino a 0.32 dal bordo è a 0.22 dal pelo
function calcScala(e, offsetPelo){
  const offset=+(offsetPelo||0); // m, quanto il pelo è sotto il bordo
  const gradi=e.gradi||Array.from({length:e.nGrad||4},()=>({alzata:e.alzata||0.20,pedata:e.pedata||0.30}));
  const res=[];
  let profAccBordo=0; // profondità dal bordo vasca
  const dettaglio=[];
  for(let i=0;i<gradi.length;i++){
    const g=gradi[i];
    const alz=+g.alzata||0;
    const ped=+g.pedata||0;
    const larg=+(e.larghezza||e.wScala||2.0);
    profAccBordo+=alz;
    const profPelo=Math.max(0,profAccBordo-offset); // profondità dal pelo acqua (non può essere negativa)
    const vol=ped*profPelo*larg;
    if(profPelo>0&&ped>0&&larg>0)res.push(...volToZonesRange(Math.max(0,profAccBordo-offset-alz),profPelo,vol));
    dettaglio.push({n:i+1,profPiano:+profPelo.toFixed(3),profBordo:+profAccBordo.toFixed(3),alzata:alz,pedata:ped,vol:+vol.toFixed(4)});
  }
  const volTot=res.reduce((s,r)=>s+(r.vol||0),0);
  return{zones:res,profMax:profAccBordo-offset,vol:volTot,dettaglio};
}

// Spiaggetta: lunghezza (m), larghezza (m), prof ingresso (m), prof fine (m)
// Volume = sezione trapezoidale × larghezza
function calcSpiaggetta(e){
  const vol=e.wSpiag*e.lSpiag*(e.profIn+e.profFin)/2;
  const zones=volToZonesRange(e.profIn,e.profFin,vol);
  return{zones,vol};
}

// Tramoggia (fossa tuffi): lunghezza sup (m), larghezza sup (m), profondità extra (m)
// Volume extra ≈ piramide tronca semplificata = A_base × prof_extra × 0.33
// Tutta in zona C (profondità > 1.35m)
function calcTramoggia(e){
  const vol=e.lTram*e.wTram*e.profExtra*0.33;
  return{zones:[{z:'C',vol}],vol};
}

// Seduta/panchina sommersa: lunghezza (m), larghezza (m), profondità acqua (m)
function calcSeduta(e){
  const vol=e.lSed*e.wSed*e.profSed;
  const zones=[volToZone(e.profSed,vol)];
  return{zones,vol};
}

// Calcola tutti i volumi extra per zona dagli elementi speciali
// segno: +1 = aggiunge acqua (tramoggia), -1 = sottrae acqua (scala, spiaggetta, seduta)
function calcElemExtra(elems,offsetPelo){
  const zoneExtra={F:0,E:0,D:0,C:0};
  let volTot=0;
  for(const e of elems){
    let r;
    if(e.tipo==='scala')r=calcScala(e,offsetPelo||0);
    else if(e.tipo==='spiaggetta')r=calcSpiaggetta(e);
    else if(e.tipo==='tramoggia')r=calcTramoggia(e);
    else if(e.tipo==='seduta')r=calcSeduta(e);
    if(r){
      const segno=(e.segno!==undefined)?e.segno:(e.tipo==='tramoggia'?1:-1);
      for(const zv of r.zones){if(zoneExtra[zv.z]!==undefined)zoneExtra[zv.z]+=segno*zv.vol;}
      volTot+=segno*r.vol;
    }
  }
  return{zoneExtra,volTot};
}

// =====================================================================
// PORTATA E ZONE
// =====================================================================
function calcSegVol(segs,L,W){return segs.map(s=>{const l=L*(s.lp/100);const dm=(s.da+s.a)/2;return{...s,lSeg:l,dM:dm,vol:W*l*dm};});}

function calcZone(segs,extraZones,volCorr){
  let z=[];
  for(const s of segs){
    const d1=Math.min(s.da,s.a),d2=Math.max(s.da,s.a);
    // Profondità costante o quasi: tutto il volume va a una sola zona
    if(d2-d1<0.001){
      const zona=ZP3.find(zn=>d1<=zn.mx)||ZP3[3];
      const ex=z.find(x=>x.z===zona.z);
      if(ex)ex.vol+=s.vol;else z.push({...zona,vol:s.vol});
      continue;
    }
    // Profondità variabile: suddividi ai breakpoints
    let cuts=[d1];for(const b of BP)if(b>d1&&b<d2)cuts.push(b);cuts.push(d2);
    for(let i=0;i<cuts.length-1;i++){
      const dm=(cuts[i]+cuts[i+1])/2;
      const zona=ZP3.find(zn=>dm<=zn.mx)||ZP3[3];
      const fr=(cuts[i+1]-cuts[i])/(d2-d1);
      const vol=s.vol*fr;
      const ex=z.find(x=>x.z===zona.z);
      if(ex)ex.vol+=vol;else z.push({...zona,vol});
    }
  }
  // Aggiungi volumi da elementi speciali
  if(extraZones){for(const zk of Object.keys(extraZones)){
    if(extraZones[zk]>0){const ex=z.find(x=>x.z===zk);const zona=ZP3.find(zn=>zn.z===zk);
      if(ex)ex.vol+=extraZones[zk];else if(zona)z.push({...zona,vol:extraZones[zk]});}
  }}
  // Aggiungi correzioni manuali per zona
  if(volCorr){for(const zk of ['F','E','D','C']){
    if(volCorr[zk]&&volCorr[zk]!==0){const ex=z.find(x=>x.z===zk);const zona=ZP3.find(zn=>zn.z===zk);
      if(ex)ex.vol=Math.max(0,ex.vol+volCorr[zk]);else if(zona&&volCorr[zk]>0)z.push({...zona,vol:volCorr[zk]});}
  }}
  return z.sort((a,b)=>a.ore-b.ore);
}

function calcPortataT2(zone,volTot,circ,sup,perim,tipoFiltro,giochiOnde){
  let Q1=0;for(const z of zone)Q1+=z.vol/z.ore;
  if(circ==='skimmer')return{Q:Q1,zone,Vc:null,note:'Skimmer — nessuna vasca di compenso'};
  const Vc=calcCompenso(Q1,volTot,sup,perim,'Tipo 2',tipoFiltro,giochiOnde);
  // Volume utile (60%) va sommato al volume vasca per il calcolo portata
  const volTotConComp=volTot+Vc.vUtile;
  let Q2=0;
  const zc=zone.map(z=>{const vz=z.vol+Vc.vUtile*(z.vol/volTot);const qz=vz/z.ore;Q2+=qz;return{...z,vComp:vz,qZ:qz};});
  return{Q:Q2,zone:zc,Vc,volTotConComp:+volTotConComp.toFixed(1),note:'Portata con vol. compenso utile ('+Vc.vUtile+' m³) sommato al volume vasca'};
}

function calcPortataDom(volTot,circ,T,sup,perim,tipoFiltro,giochiOnde){
  const Q=volTot/T;
  let Vc=null;
  if(circ==='sfioro'){
    Vc=calcCompensoDOM(Q,volTot,sup,perim,tipoFiltro,giochiOnde);
    // Volume utile sommato al volume vasca per il T di ricircolo
    const volTotConComp=volTot+Vc.vUtile;
    const Qc=volTotConComp/T;
    return{Q:Qc,T,Vc,volTotConComp:+volTotConComp.toFixed(1),note:'T='+T+'h — V vasca '+volTot.toFixed(1)+' + V utile compenso '+Vc.vUtile+' = '+volTotConComp.toFixed(1)+' m³ → Q='+Qc.toFixed(1)+' m³/h'};
  }
  return{Q,T,Vc,note:'T='+T+'h Acqualab (EN 16713-2: max 8h)'};
}

// VASCA DI COMPENSO — UNI 10637:2024
// Volume utile = volume totale compenso × 60% (livello operativo al 60% dell'altezza)
// Volume utile VA SOMMATO al volume vasca per il calcolo della portata
// Spazio libero (40%) deve contenere: V bagnanti + V onde + V canaletta
// Il volume utile deve anche garantire la continuità durante il controlavaggio (1 filtro)
// Questa logica è riferimento tecnico valido anche per piscine domestiche
function calcCompenso(Q,volTot,sup,perim,tipoPisc,tipoFiltro,giochiOnde){
  // Bagnanti: sup / 3 m²/persona (UNI 10637:2024)
  const nBag=Math.ceil(sup/3);
  // Spazio libero necessario (sopra livello operativo)
  const vBag=+(nBag*0.070).toFixed(2);          // 70 l/persona
  const vOnde=+(nBag*0.035).toFixed(2);          // 35 l/persona (50% del volume spostato)
  const vCanal=+(perim*0.015).toFixed(2);        // acqua in transito canaletta (stima: perim × sezione 15×10cm)
  let vLibero=+(vBag+vOnde+vCanal).toFixed(2);   // totale spazio libero necessario
  // Giochi d'acqua con moto ondoso: +30% sullo spazio libero
  const mgGiochi=giochiOnde?0.30:0;
  const vGiochiOnde=giochiOnde?+(vLibero*0.30).toFixed(2):0;
  if(giochiOnde)vLibero=+(vLibero*1.30).toFixed(2);
  // Controlavaggio: portata × 5 min (solo sabbia, con 2 filtri si lava 1 alla volta)
  const vContro=tipoFiltro==='sabbia'?+(Q*5/60).toFixed(2):0;
  // Volume minimo compenso: il maggiore tra i due vincoli
  const vTotMin1=vLibero/0.40;
  const vTotMin2=vContro>0?vContro/0.60:0;
  const vTotMin=+Math.max(vTotMin1,vTotMin2).toFixed(1);
  const vincolo=vTotMin2>vTotMin1?'controlavaggio':'bagnanti+onde'+(giochiOnde?'+giochi':'');
  // Volume utile = 60% del volume totale → va sommato al volume vasca
  const vUtile=+(vTotMin*0.60).toFixed(1);
  return{nBag,vBag,vOnde,vCanal,vGiochiOnde,mgGiochi,vLibero,vContro,vTotMin,vUtile,vincolo,giochiOnde,
    note:'UNI 10637:2024 — volume utile (60%) sommato a volume vasca per calcolo Q'};
}

function calcCompensoDOM(Q,volTot,sup,perim,tipoFiltro,giochiOnde){
  const nBag=Math.max(2,Math.ceil(sup/4));
  const vBag=+(nBag*0.070).toFixed(2);
  const vOnde=+(nBag*0.035).toFixed(2);
  const vCanal=+(perim*0.012).toFixed(2);
  let vLibero=+(vBag+vOnde+vCanal).toFixed(2);
  const mgGiochi=giochiOnde?0.30:0;
  const vGiochiOnde=giochiOnde?+(vLibero*0.30).toFixed(2):0;
  if(giochiOnde)vLibero=+(vLibero*1.30).toFixed(2);
  const vContro=tipoFiltro==='sabbia'?+(Q*3/60).toFixed(2):0;
  const vTotMin1=vLibero/0.40;
  const vTotMin2=vContro>0?vContro/0.60:0;
  const vTotMin=+Math.max(vTotMin1,vTotMin2).toFixed(1);
  const vincolo=vTotMin2>vTotMin1?'controlavaggio':'bagnanti+onde'+(giochiOnde?'+giochi':'');
  const vUtile=+(vTotMin*0.60).toFixed(1);
  return{nBag,vBag,vOnde,vCanal,vGiochiOnde,mgGiochi,vLibero,vContro,vTotMin,vUtile,vincolo,giochiOnde,
    note:'Rif. UNI 10637:2024 — applicato come buona pratica per domestica'};
}

// RIPARTIZIONE — PROPRIETÀ: qSup, qFondo, pSup, pFondo, note
function calcRip(Q,tipoPisc,noPF){
  if(noPF)return{qSup:Q,qFondo:0,pSup:100,pFondo:0,note:'Solo aspirazione superficie — prese di fondo ESCLUSE (scelta progettuale)'};
  if(tipoPisc==='Tipo 2')return{qSup:Q*0.75,qFondo:Q*0.25,pSup:75,pFondo:25,note:'UNI 10637:2024 — ≥75% sup / ≤25% fondo (obbligatorio)'};
  return{qSup:Q*(2/3),qFondo:Q*(1/3),pSup:66.7,pFondo:33.3,note:'UNI EN 16713-2 — 2/3 sup + 1/3 fondo (regola progettuale)'};
}

// FILTRI — sabbia O cartuccia
// Restituisce TUTTI i filtri compatibili (non solo il più economico per nf)
// perché autoSelFP deve provarli tutti per il vincolo Q_clean (filtro pulito (appena lavato))
function selFiltri(Qm3h,tipoPisc,tipoFiltro){
  // Per cartuccia: nessun margine — qr è il limite dichiarato dal costruttore
  // Per sabbia: +15% per compensare l'intasamento progressivo
  const Qf=tipoFiltro==='cartuccia'?Qm3h:Qm3h*PR.MARG_F;
  let cat;
  if(tipoFiltro==='cartuccia'){cat=FC;}
  else{cat=tipoPisc==='Tipo 2'?FS_U:FS_P;}
  // vfMax: sabbia = sezione serbatoio, cartuccia = sviluppo totale tessuto pieghettato
  const vfMax=tipoFiltro==='cartuccia'
    ?(tipoPisc==='Tipo 2'?1.8:2.0)
    :(tipoPisc==='Tipo 2'?30:50);
  let configs=[];
  for(const fornKey of Object.keys(cat)){
    const listino=cat[fornKey];
    for(let nf=1;nf<=3;nf++){
      const qpf=Qf/nf;
      for(const f of listino){
        const vf=qpf/f.sf;
        const qrOk=(!f.qr||qpf<=f.qr)&&(!f.q||qpf<=f.q);
        if(vf<=vfMax&&qrOk){
          let ct=f.p*nf;
          const entry={...f,nf,vf:+vf.toFixed(1),qpf:+qpf.toFixed(1),forn:fornKey};
          if(!f.vi){const vlObj=C_VL[fornKey]||[];const vl=Array.isArray(vlObj)?vlObj:(f.vg&&vlObj[f.vg]?vlObj[f.vg]:[]);const vsz=(f.d||0)>=1000?'3"':(f.d||0)>=700?'2"':'1.5"';const v=vl.find(x=>x.cn===vsz)||vl.find(x=>x.cn==='2"')||vl[0];if(v){ct+=v.p*nf;entry.valvC=v.cn;entry.valvP=v.p;}}
          configs.push({...entry,ct:+ct.toFixed(0)});
        }
      }
    }
  }
  configs.sort((a,b)=>{
    // Prima: minor numero di filtri
    if(a.nf!==b.nf)return a.nf-b.nf;
    // Poi per cartuccia: preferisci TASCO (Hayward SwimClear)
    if(tipoFiltro==='cartuccia'){
      if(a.forn==='TASCO'&&b.forn!=='TASCO')return -1;
      if(a.forn!=='TASCO'&&b.forn==='TASCO')return 1;
    }
    // Poi minor velocità di filtrazione
    return a.vf-b.vf;
  });
  return configs;
}

function selPompe(Qm3h,forn,ali,Hprog){
  return(C_PM[forn]||[]).filter(p=>{
    if(ali&&ali!=='tutte'&&!p.al.includes(ali))return false;
    const qAtH=pumpQatH(p,Hprog||0);
    return qAtH>=Qm3h;
  }).map(p=>({...p,qAtH:+pumpQatH(p,Hprog||0).toFixed(1)}))
    .sort((a,b)=>a.p-b.p).slice(0,8);
}

// AUTO-SELEZIONE FILTRO+POMPA — proposta automatica migliore
// REGOLA: 1 pompa per filtro. Q_pompa = Qtot / N_filtri.
// VERIFICA FILTRO PULITO: la pompa a filtro pulito (appena lavato) eroga Q_max > Q_progetto.
//   Il filtro deve reggere Q_max (qr per cartuccia, sf×vfMax per sabbia).
// Tipo 2: N_pompe = N_filtri + 1 riserva (UNI 10637:2024)
// Domestica: N_pompe = N_filtri
function autoSelFP(Qtot,tipoPisc,tipoFiltro,sup,nPompeRichieste,Hprog){
  // Default Acqualab: KS EVO (TASCO), C150SE, Astral, Pool's
  const PREF_PUMP=['KSE050','KSE075','KSE100','KSE150','KSE200','KSE300'];
  const PREF_FILTRO=['C150SE','C250SE','C500SE','MC50','MC75','MC100'];
  const filtri=selFiltri(Qtot,tipoPisc,tipoFiltro);
  const fValid=filtri.filter(f=>!(tipoPisc==='Tipo 2'&&sup>100&&f.nf<2));
  if(fValid.length===0)return{filtro:null,pompa:null,err:'Nessun filtro compatibile'};
  // H a filtro pulito (appena lavato): sostituisci H_filtro_sporco con H_filtro_pulito
  const hFiltSporco=tipoFiltro==='cartuccia'?PR.HF_C:PR.HF_S;
  const hFiltPulito=tipoFiltro==='cartuccia'?PR.HF_C0:PR.HF_S0;
  const Hclean=Math.max(0,(Hprog||0)-hFiltSporco+hFiltPulito);
  const vfMax=tipoFiltro==='cartuccia'
    ?(tipoPisc==='Tipo 2'?1.8:2.0)
    :(tipoPisc==='Tipo 2'?30:50);
  let best=null;
  // Ordina filtri: preferiti Acqualab prima
  const fSorted=[...fValid].sort((a,b)=>{
    const ia=PREF_FILTRO.indexOf(a.c), ib=PREF_FILTRO.indexOf(b.c);
    if(ia>=0&&ib<0)return -1; if(ib>=0&&ia<0)return 1;
    if(ia>=0&&ib>=0)return ia-ib;
    return 0;
  });
  for(const f of fSorted){
    const qPerPompa=Qtot/f.nf;
    const nPompe=tipoPisc==='Tipo 2'?f.nf+1:f.nf;
    const pompe=selPompe(qPerPompa,f.forn,'tutte',Hprog);
    // Ordina pompe: preferite Acqualab (KS EVO) prima, poi per potenza minima sufficiente
    const pompeSort=[...pompe].sort((a,b)=>{
      const ia=PREF_PUMP.indexOf(a.c), ib=PREF_PUMP.indexOf(b.c);
      if(ia>=0&&ib<0)return -1; if(ib>=0&&ia<0)return 1;
      if(ia>=0&&ib>=0)return ia-ib;
      return a.hp-b.hp;
    });
    for(const p of pompeSort){
      // Q a filtro pulito (appena lavato) (per pompa singola)
      const qClean=pumpQatH(p,Hclean);
      // Verifica: il filtro regge Q_clean?
      const qCat=f.q||f.qr||999; // portata max dichiarata catalogo
      const qNorm=f.sf*vfMax;   // portata max da velocità normativa
      const qrFiltro=Math.min(qCat,qNorm); // il più restrittivo tra catalogo e norma
      if(qClean>qrFiltro)continue; // filtro non regge la pompa a filtro pulito (appena lavato) → skip
      const costoTot=f.ct+p.p*nPompe;
      const isPref=PREF_PUMP.includes(p.c)&&PREF_FILTRO.includes(f.c);
      const bestIsPref=best&&PREF_PUMP.includes(best.pompa&&best.pompa.c)&&PREF_FILTRO.includes(best.filtro&&best.filtro.c);
      if(!best||(isPref&&!bestIsPref)||(isPref===bestIsPref&&costoTot<best.costoTot)){
        best={filtro:f,pompa:p,costoTot,nPompe,qPerPompa:+qPerPompa.toFixed(1),
          qMin:+pumpQatH(p,Hprog||0).toFixed(1),
          qClean:+qClean.toFixed(1),qrFiltro:+qrFiltro.toFixed(1),Hclean:+Hclean.toFixed(2)};
      }
      break; // prima pompa compatibile per questo filtro (già ordinata per prezzo)
    }
  }
  if(!best)return{filtro:fValid[0],pompa:null,nPompe:nPompeRichieste,qPerPompa:Qtot,
    err:'Nessuna combinazione filtro+pompa compatibile: nessuna pompa a H='+((Hprog||0)).toFixed(1)+' mca con filtro che regga Q a filtro pulito (appena lavato) (H='+Hclean.toFixed(1)+' mca)'};
  return best;
}

// Verifiche normative
function verNorm(tipoPisc,circ,sup,perim,nFiltri,nPompe,nSki,Qtot,rip,pfSic,pr){
  let err=[],warn=[],ok=[];
  // --- SICUREZZA ASPIRAZIONI (sempre, per entrambi i tipi) ---
  if(pfSic){
    if(!pfSic.ok)pfSic.err.forEach(e=>err.push(e));
    pfSic.warn.forEach(w=>warn.push(w));
    if(pfSic.ok){
      if(tipoPisc==='Tipo 2')ok.push('Prese fondo: verifica sicurezza OK (UNI EN 13451-3 — Q per presa con 1 ostruita ≤ Q max griglia)');
      else ok.push('Prese fondo: verifica sicurezza OK (UNI EN 16582/16713 — Q per presa con 1 ostruita ≤ Q max griglia, rif. prodotto EN 13451-3)');
    }
  }
  // Warning architetturale collettore unico
  if(nPompe>1)warn.push('CRITICITÀ ARCHITETTUALE: impianto multi-pompa con collettore unico — portata massima applicabile alle prese fondo = somma portate pompe in esercizio. Verificare che le griglie e la tubazione reggano il caso peggiore.');

  if(tipoPisc==='Tipo 2'){
    if(circ==='skimmer'&&sup>100)err.push('Sup > 100 m²: sfioro obbligatorio (UNI 10637:2024)');
    if(circ==='skimmer'){const m=Math.ceil(sup/20);if(nSki<m)err.push('Servono ≥'+m+' skimmer (1/20 m²)');else ok.push('Skimmer '+nSki+' ≥ '+m+' ✓');}
    if(circ==='sfioro'){const mp=sup>100?50:30;ok.push('Sfioro ≥ '+mp+'% perimetro ('+(perim*mp/100).toFixed(1)+' m)');}
    const pS=(rip.qSup/Qtot)*100;
    if(pS<74.9)err.push('Ripartizione asp. '+pS.toFixed(0)+'% < 75%');else ok.push('Ripartizione asp. '+pS.toFixed(0)+'% sup ✓');
    if(sup>100&&nFiltri<2)err.push('Sup > 100 m²: min 2 filtri');else if(nFiltri>=1)ok.push('Filtri '+nFiltri+' ✓');
    const nr=nFiltri+1;if(nPompe<nr)err.push('Servono '+nr+' pompe ('+nFiltri+'+1 riserva)');else ok.push('Pompe '+nPompe+' = '+nFiltri+'+1 riserva ✓');
    ok.push('Dosaggio automatico cloro/pH obbligatorio (UNI 10637:2024)');
    ok.push('Contatore volumetrico obbligatorio (UNI 10637:2024)');
    ok.push('Svuotamento triennale (L.R. Toscana 8/2006)');
    ok.push('Rinnovo acqua: max(30 l/bagnante/g, 1,5% vol.)');
    ok.push('Prese fondo: ≥2, dist. ≥2m (T2) / ≥1m (dom.), griglia EN 13451-3, v griglia ≤0,5 m/s');
  }else{
    const pS=(rip.qSup/Qtot)*100;
    if(Math.abs(pS-66.7)>5)warn.push('Ripartizione '+pS.toFixed(0)+'% — regola progettuale 2/3+1/3');else ok.push('Ripartizione 2/3+1/3 ✓');
    ok.push('T ricircolo = '+pr.T+'h Acqualab (UNI EN 16713-2: max 8h)');
    ok.push('Prese fondo: griglia anti-intrappolamento obbligatoria (UNI EN 16582-1, rif. prodotto EN 13451-3)');
    ok.push('Circolazione senza zone morte (UNI EN 16713-2)');
    ok.push('v asp ≤ 1,7 m/s, man ≤ 2,5 m/s — criteri progettuali Acqualab (UNI EN 13451 norma solo la griglia prese fondo: v ≤ 0,5 m/s)');
    ok.push('UNI EN 16713-2: nessun vincolo minimo filtri/pompe');
  }
  return{err,warn,ok};
}

function filtraSki(co,mat){return C_SKI.filter(s=>{if(mat&&s.mat!==mat)return false;if(co==='calcestruzzo')return s.ps.includes('cemento');if(co==='liner')return s.ps.includes('liner')||s.ps.includes('PVC');if(co==='pannelli')return s.ps.includes('pannelli');return true;});}
function filtraBP(co,mat){return C_BP.filter(b=>{if(mat&&b.mat!==mat)return false;if(co==='calcestruzzo')return b.ps.includes('cemento');if(co==='liner')return b.ps.includes('liner')||b.ps.includes('PVC');if(co==='pannelli')return b.ps.includes('pannelli');return true;});}

// Selezione set accessori coerente: stesso materiale, preferire ABS, confronto costo totale
function selSetAccessori(tipoPisc,costruz,circ,Qtot,rip,nPF_unused,qPP_unused,Qdim,noPF){
  const Qdimensionamento=Qdim||Qtot; // Q max pompa a filtro pulito (appena lavato)
  // Default Acqualab: Astral skimmer, Pool's bocchette
  const PREF_SKI=noPF?['1115463','1115462']:['56176','56176CL090']; // Pool's alta portata se noPF, Astral altrimenti
  const PREF_BP=['1115469','1115467'];      // Pool's bocchetta ABS sfera
  const PREF_PF=['56380','56380CL090'];     // Scarico fondo NORM Astral griglia piana
  const bpABS=filtraBP(costruz,'ABS');
  const skiABS=circ==='skimmer'?filtraSki(costruz,'ABS'):[];
  const ski0=skiABS.length>0?skiABS.sort((a,b)=>{
    const ia=PREF_SKI.indexOf(a.c), ib=PREF_SKI.indexOf(b.c);
    if(ia>=0&&ib<0)return -1; if(ib>=0&&ia<0)return 1;
    if(ia>=0&&ib>=0)return ia-ib;
    return (a.m||'').localeCompare(b.m||'');
  })[0]:null;
  const bp0=bpABS.length>0?bpABS.sort((a,b)=>{
    const ia=PREF_BP.indexOf(a.c), ib=PREF_BP.indexOf(b.c);
    if(ia>=0&&ib<0)return -1; if(ib>=0&&ia<0)return 1;
    if(ia>=0&&ib>=0)return ia-ib;
    return (a.m||'').localeCompare(b.m||'');
  })[0]:null;
  // Genera TUTTE le opzioni possibili: per ogni griglia, calcola nPF e costo
  const opts=[];
  const pfAll=filtraPF(tipoPisc,costruz); // tutte le griglie (ABS+INOX) per questo tipo/costruzione
  for(const pf of pfAll){
    const nPF=Math.max(2, nPreseFondoSicurezza(Qdimensionamento, pf.q), nPreseFondo(rip.qFondo));
    const qPP=Qdimensionamento/(Math.max(1,nPF-1));
    if(qPP<=pf.q){ // questa griglia regge
      const costoTotPF=(pf.p||0)*nPF;
      opts.push({pf,nPF,qPP:+qPP.toFixed(1),costo:costoTotPF,mat:pf.mat});
    }
  }
  if(opts.length===0){
    return{mat:'N/D',pf:pfAll[0]||null,bp:bp0,ski:ski0,nPF:2,note:'Nessuna griglia compatibile'};
  }
  // Ordina: 1. ABS prima di INOX (preferenza), 2. costo totale crescente
  opts.sort((a,b)=>{
    if(a.mat==='ABS'&&b.mat!=='ABS')return -1;
    if(a.mat!=='ABS'&&b.mat==='ABS')return 1;
    // Preferisci Astral NORM griglia piana
    const ia=PREF_PF.indexOf(a.pf&&a.pf.c), ib=PREF_PF.indexOf(b.pf&&b.pf.c);
    if(ia>=0&&ib<0)return -1; if(ib>=0&&ia<0)return 1;
    if(ia>=0&&ib>=0)return ia-ib;
    return a.costo-b.costo;
  });
  const best=opts[0];
  const matNote=best.mat==='INOX'?'Prese fondo INOX 316: soluzione più economica rispetto ad ABS per questa portata.':'';
  return{mat:best.mat,pf:best.pf,bp:bp0,ski:ski0,nPF:best.nPF,qPP:best.qPP,note:matNote};
}

// =====================================================================
// CALCOLO PREVALENZA AUTONOMO (per iterazione Fase 5 e prompt)
// Ricalcola prevalenza per una data portata Qdim usando le lunghezze
// e i raccordi dell'utente — serve per il dimensionamento iterativo.
// =====================================================================
function calcHcircuito(Qdim,tipoPisc,circ,tipoTubo,tipoFiltro,sup,tl,tr,qt,hAcc){
  const ripD=calcRip(Qdim,tipoPisc);
  const nSki=circ==='skimmer'?nSkimmer(sup,tipoPisc):1;
  const nBocc=Math.max(2,Math.ceil(Qdim/5));
  const qA=ripD.qSup/nSki;
  const qM=Qdim/nBocc;
  const defs=[
    {k:'A',tp:'asp',Q:qA,Qdn:qA,dnMin:circ==='skimmer'?PR.DN_MIN_SKI:0},
    {k:'PF',tp:'asp',Q:ripD.qFondo,Qdn:Qdim,dnMin:PR.DN_MIN_PF},
    {k:'C',tp:'asp',Q:Qdim,Qdn:Qdim,dnMin:0},
    {k:'M',tp:'man',Q:qM,Qdn:qM,dnMin:PR.DN_MIN_BOCC}
  ];
  const hds={};
  for(const t of defs){
    const dn=selDN(t.Qdn,t.tp,tipoTubo,tipoPisc,t.dnMin);
    const lq=calcLeq(dn.dn,tr[t.k]||{});
    var _Lh=tlH(tl,t.k), _Lv=tlV(tl,t.k);
    var _diFlex=selDN(t.Qdn,t.tp,'flex',tipoPisc,t.dnMin).di;
    var _diRig=selDN(t.Qdn,t.tp,'rigido',tipoPisc,t.dnMin).di;
    var _hH=_Lh>0?calcHd(t.Q,_diFlex,_Lh):0;
    var _hV=calcHd(t.Q,_diRig,_Lv+lq);
    hds[t.k]=+(_hH+_hV).toFixed(3);
  }
  const hAsp=Math.max(hds.A,hds.PF)+hds.C;
  const hMan=hds.M;
  const isCart=tipoFiltro==='cartuccia';
  const hF=isCart?PR.HF_C:PR.HF_S;
  const hVL=isCart?0:PR.H_VL;
  let hStat=0;if(circ==='sfioro')hStat=Math.max(0,(qt.livVasca||0)-(qt.fondoCompenso||0));
  return +(hAsp+hMan+hF+hVL+PR.H_PF+hStat+0.5+hAcc).toFixed(2);
}

      <div><label>Prof. acqua fine (m)</label><input type="number" min="0" step=".05" value={s.a} onChange={e=>uS(s.id,'a',e.target.value)}/></div>

    </div>
    {sv[i]&&<div style={{fontSize:'.66rem',color:'#888',marginTop:2}}>Vol: {sv[i].vol.toFixed(1)} m³ · Prof. media: {sv[i].dM.toFixed(2)} m
      {d.tipoPisc==='Tipo 2'&&(()=>{const dm=sv[i].dM;const z=ZP3.find(x=>dm<=x.mx)||ZP3[3];return<span> · <span className={'zt '+z.cl}>{z.z} ({z.ore}h)</span></span>;})()}
    </div>}</div>))}
    <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4}}>
      <button className="bn-sm" onClick={aS}>+ Segmento</button>

    </div>
  </div>
  <div className="cd"><h2>Giochi d'acqua (opzionale)</h2>

    <div style={{fontSize:'.62rem',color:'#888',marginBottom:4}}>Portate tipiche: Cascata decorativa 2–5 m³/h · Lama d'acqua 3–8 m³/h · Geyser/aeratore 1–3 m³/h · Nuoto controcorrente 40–70 m³/h (circuito dedicato, pompa separata)</div>
    {d.giochi.map(g=>(<div key={g.id} className="rw" style={{marginBottom:4}}>

      <div style={{fontSize:'.6rem',color:'var(--or)',marginTop:2}}>Se attivo: +30% sullo spazio libero della vasca di compenso per il moto ondoso generato dai giochi. Non selezionare per getti sommersi che non creano onde significative in superficie.</div>

  </div>

  {/* ELEMENTI SPECIALI */}

    {d.elem.map((e,i)=>{
      const segno=e.segno!==undefined?e.segno:(e.tipo==='tramoggia'?1:-1);
      const setSeg=s=>u('elem',d.elem.map(x=>x.id===e.id?{...x,segno:s}:x));
      return(<div key={e.id} style={{background:'#f9f7f2',borderRadius:6,padding:8,marginBottom:6,border:'1.5px solid '+(segno>0?'#a8d5b5':'#f0b8b8')}}>

        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <b style={{fontSize:'.76rem'}}>{e.tipo==='scala'?'🪜 Scala':e.tipo==='spiaggetta'?'🏖 Spiaggetta':e.tipo==='tramoggia'?'🏊 Tramoggia (fossa tuffi)':'💺 Seduta/panchina'}</b>
          <div className="tg" style={{marginLeft:4}}>
            <button className={segno>0?'a':''} onClick={()=>setSeg(1)} style={{padding:'3px 10px',fontSize:'.7rem'}} title="Aggiunge volume acqua">＋</button>
            <button className={segno<0?'a':''} onClick={()=>setSeg(-1)} style={{padding:'3px 10px',fontSize:'.7rem',background:segno<0?'var(--rd)':''}} title="Sottrae volume acqua">－</button>
          </div>
          <span style={{fontSize:'.6rem',color:segno>0?'var(--gn)':'var(--rd)',fontWeight:700}}>{segno>0?'aggiunge acqua':'sottrae acqua'}</span>

          </div>
          <div style={{display:'flex',alignItems:'flex-end',gap:6,flexWrap:'wrap'}}>
            <button className="bn-sm" onClick={()=>{
              const gradi=(e.gradi||[]);

            }}>+ Gradino</button>
            {(e.gradi||[]).length>1&&<button className="bn-sm bn-rm" onClick={()=>{
              const gradi=(e.gradi||[]).slice(0,-1);
              u('elem',d.elem.map(x=>x.id===e.id?{...x,gradi}:x));

        </div>
        <table className="t" style={{fontSize:'.68rem',marginBottom:4}}>
          <thead><tr><th style={{width:40}}>Grad.</th><th>Alzata (m)</th><th>Pedata (m)</th><th>Piano (m)</th><th>Dal bordo (m)</th><th>Dal pelo (m)</th><th>Volume (m³)</th></tr></thead>
          <tbody>{(e.gradi||[{alzata:e.alzata||0.20,pedata:e.pedata||0.30}]).map((g,gi,arr)=>{
            const profBordo=arr.slice(0,gi+1).reduce((s,x)=>s+(+x.alzata||0),0);
            const pianoCum=arr.slice(0,gi+1).reduce((s,x)=>s+(+x.pedata||0),0);
            const larg=+(e.larghezza||e.wScala||2.0);
            const livVasca=+(d.qt&&d.qt.livVasca!=null?d.qt.livVasca:0);
            const livAcqua=+(d.qt&&d.qt.livAcqua!=null?d.qt.livAcqua:0);
            const offset=Math.max(0,livVasca-livAcqua);
            const profPelo=Math.max(0,profBordo-offset);
            const vol=(+g.pedata||0)*profPelo*larg;
            return<tr key={gi}>
              <td style={{textAlign:'center',fontWeight:700,color:'var(--bl)'}}>{gi+1}</td>
              <td><input type="number" min=".01" step=".01" value={g.alzata}
                style={{width:'100%',padding:'3px 5px',border:'1px solid var(--c3)',borderRadius:4,fontSize:'.7rem'}}
                onChange={ev=>{const gradi=[...(e.gradi||[{alzata:e.alzata||0.20,pedata:e.pedata||0.30}])];gradi[gi]={...gradi[gi],alzata:+ev.target.value};u('elem',d.elem.map(x=>x.id===e.id?{...x,gradi}:x));}}/></td>
              <td><input type="number" min=".01" step=".01" value={g.pedata}
                style={{width:'100%',padding:'3px 5px',border:'1px solid var(--c3)',borderRadius:4,fontSize:'.7rem'}}
                onChange={ev=>{const gradi=[...(e.gradi||[{alzata:e.alzata||0.20,pedata:e.pedata||0.30}])];gradi[gi]={...gradi[gi],pedata:+ev.target.value};u('elem',d.elem.map(x=>x.id===e.id?{...x,gradi}:x));}}/></td>
              <td style={{color:'#555'}}>{pianoCum.toFixed(3)}</td>
              <td style={{color:'#aaa',fontSize:'.65rem'}}>{profBordo.toFixed(3)}</td>
              <td style={{color:offset>0?'var(--gn)':'#888',fontWeight:offset>0?700:400}}>{profPelo.toFixed(3)}</td>
              <td style={{fontWeight:600,color:'var(--gn)'}}>{isNaN(vol)||profPelo<=0?'—':vol.toFixed(4)}</td>
            </tr>;

        </table>
        {(()=>{
          const gradi=e.gradi||[{alzata:e.alzata||0.20,pedata:e.pedata||0.30}];
          const offset=Math.max(0,(d.qt&&d.qt.livVasca||0)-(d.qt&&d.qt.livAcqua||0));
          const r=calcScala({...e,gradi,larghezza:+(e.larghezza||e.wScala||2.0)},offset);
          return<div style={{fontSize:'.68rem',color:'var(--bl)',fontWeight:700}}>
            {offset>0&&<span style={{color:'var(--or)',fontWeight:400,marginRight:6}}>Pelo a -{(offset*100).toFixed(0)}cm dal bordo — profondità corretta</span>}

          </div>;
        })()}
      </div>}
      {e.tipo==='spiaggetta'&&<div>
        <div style={{fontSize:'.6rem',color:'#888',marginBottom:4}}>Ingresso a spiaggia con pendenza costante. Profondità varia linearmente dall'ingresso alla fine.</div>
        <div className="rw">
          <div><label>Lunghezza (m) <span className="hn">nella direzione della pendenza</span></label><input type="number" min=".1" step=".1" value={e.lSpiag} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,lSpiag:+ev.target.value}:x))}/></div>
          <div><label>Larghezza (m) <span className="hn">dimensione trasversale</span></label><input type="number" min=".1" step=".1" value={e.wSpiag} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,wSpiag:+ev.target.value}:x))}/></div>
          <div><label>Prof. acqua ingresso (m) <span className="hn">es: 0.02</span></label><input type="number" min="0" step=".01" value={e.profIn} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,profIn:+ev.target.value}:x))}/></div>
          <div><label>Prof. acqua fine (m) <span className="hn">es: 0.40</span></label><input type="number" min="0" step=".05" value={e.profFin} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,profFin:+ev.target.value}:x))}/></div>
        </div>
        {(()=>{const r=calcSpiaggetta(e);return<div style={{fontSize:'.6rem',color:'var(--bl)',marginTop:2}}>Vol.: {r.vol.toFixed(1)} m³ · Zone: {r.zones.map(z=>z.z+':'+z.vol.toFixed(1)).join(' + ')} m³</div>;})()}
      </div>}
      {e.tipo==='tramoggia'&&<div>
        <div style={{fontSize:'.6rem',color:'#888',marginBottom:4}}>Fossa tuffi trapezoidale nel punto più profondo. Volume ≈ 1/3 × area base × profondità extra.</div>
        <div className="rw">
          <div><label>Lunghezza base sup. (m)</label><input type="number" min=".5" step=".5" value={e.lTram} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,lTram:+ev.target.value}:x))}/></div>
          <div><label>Larghezza base sup. (m)</label><input type="number" min=".5" step=".5" value={e.wTram} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,wTram:+ev.target.value}:x))}/></div>
          <div><label>Profondità extra (m) <span className="hn">rispetto al fondo vasca</span></label><input type="number" min=".1" step=".1" value={e.profExtra} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,profExtra:+ev.target.value}:x))}/></div>
        </div>
        {(()=>{const r=calcTramoggia(e);return<div style={{fontSize:'.6rem',color:'var(--bl)',marginTop:2}}>Vol. extra: {r.vol.toFixed(1)} m³ (zona C, >1.35m)</div>;})()}
      </div>}
      {e.tipo==='seduta'&&<div>
        <div style={{fontSize:'.6rem',color:'#888',marginBottom:4}}>Panchina o seduta sommersa. Volume = lunghezza × larghezza × profondità acqua sopra la seduta.</div>
        <div className="rw">
          <div><label>Lunghezza (m)</label><input type="number" min=".1" step=".1" value={e.lSed} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,lSed:+ev.target.value}:x))}/></div>
          <div><label>Larghezza (m)</label><input type="number" min=".1" step=".1" value={e.wSed} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,wSed:+ev.target.value}:x))}/></div>
          <div><label>Prof. acqua (m) <span className="hn">dalla superficie al piano seduta</span></label><input type="number" min=".1" step=".05" value={e.profSed} onChange={ev=>u('elem',d.elem.map(x=>x.id===e.id?{...x,profSed:+ev.target.value}:x))}/></div>
        </div>
        {(()=>{const r=calcSeduta(e);return<div style={{fontSize:'.6rem',color:'var(--bl)',marginTop:2}}>Vol.: {r.vol.toFixed(1)} m³ · Zona: {r.zones[0].z}</div>;})()}
      </div>}
    </div>);})}
    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      <button className="bn-sm" onClick={()=>u('elem',[...d.elem,{id:Date.now(),tipo:'scala',segno:-1,larghezza:2.0,gradi:[{alzata:0.20,pedata:0.30},{alzata:0.20,pedata:0.30},{alzata:0.20,pedata:0.30},{alzata:0.20,pedata:0.30}]}])}>+ Scala</button>
      <button className="bn-sm" onClick={()=>u('elem',[...d.elem,{id:Date.now()+1,tipo:'spiaggetta',segno:-1,lSpiag:3,wSpiag:2,profIn:0.02,profFin:0.40}])}>+ Spiaggetta</button>
      <button className="bn-sm" onClick={()=>u('elem',[...d.elem,{id:Date.now()+2,tipo:'tramoggia',segno:1,lTram:3,wTram:3,profExtra:1.0}])}>+ Tramoggia</button>
      <button className="bn-sm" onClick={()=>u('elem',[...d.elem,{id:Date.now()+3,tipo:'seduta',segno:-1,lSed:2,wSed:0.5,profSed:0.50}])}>+ Seduta</button>
    </div>

  </div>

  {/* CORREZIONE VOLUME MANUALE + IMMAGINE */}
  <div className="cd"><h2>Correzione manuale volume (opzionale)</h2>
    {d.tipoPisc==='Tipo 2'?(<div>
      <div style={{fontSize:'.62rem',color:'#888',marginBottom:4}}>Correzione manuale del volume per zona. Usare valori negativi per sottrarre volume (es: area occupata da strutture in vasca). Per Tipo 2 ogni zona ha il proprio tempo di ricircolo → la correzione impatta la portata.</div>
      <div className="rw">
        <div><label>Correz. ±m³ zona F (≤0.4m)</label><input type="number" step=".1" value={d.volCorr.F} onChange={e=>u('volCorr',{...d.volCorr,F:+e.target.value})}/></div>

        <div><label>Correz. ±m³ zona C (>1.35m)</label><input type="number" step=".1" value={d.volCorr.C} onChange={e=>u('volCorr',{...d.volCorr,C:+e.target.value})}/></div>
      </div>
    </div>):(<div>
      <div style={{fontSize:'.62rem',color:'#888',marginBottom:4}}>Correzione manuale del volume totale. Usare valori negativi per sottrarre volume (es: strutture in vasca).</div>
      <div className="rw">
        <div><label>Correz. ±m³ volume totale</label><input type="number" step=".1" value={d.volCorr.tot} onChange={e=>u('volCorr',{...d.volCorr,tot:+e.target.value})}/></div>
      </div>
    </div>)}
    <div style={{marginTop:8}}>
      <label style={{fontWeight:700,fontSize:'.76rem'}}>Immagine di riferimento (pianta, sezione, foto)</label>

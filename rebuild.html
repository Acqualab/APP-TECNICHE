          {dc.ski.dnRamo.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>}{dc.ski.dnRamo.vWarn&&dc.ski.dnRamo.ok&&<span className="bg" style={{background:'#fef3cd',color:'#856404',marginLeft:4}}>BP</span>}</div>
      </div>):(<div>
        <div className="dl"><b>{dc.sfi.n} pilette D.{dc.sfi.dnPil}</b> PVC-U arancione (UNI EN 1401)</div>
        <div className="dl">Q sup: {dc.sfi.qSup} m³/h → Q progetto +{dc.sfi.mg}%: <b>{dc.sfi.qProg} m³/h</b></div>
        <div className="dl">Battente canaletta: <b>{dc.sfi.batt} mm</b> (max 30 mm)</div>
        <div className="pr"><span className="dn dn-s">D.{dc.sfi.collScar.dn}</span> Collettore scarico → compenso · pend. ≥1% · riemp. ≤50% · Q max: {dc.sfi.collScar.qMax} m³/h
          {dc.sfi.collScar.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>}</div>
        {dc.aspFango&&<div style={{marginTop:6,padding:8,background:'#f5f0e8',borderRadius:6,borderLeft:'3px solid var(--or)'}}>
          <div style={{fontSize:'.78rem',fontWeight:700}}>Presa aspirafango a parete</div>
          <div style={{fontSize:'.68rem',color:'#555',marginTop:2}}>Linea dedicata D.{dc.aspFango.dn.dn} con valvola a sfera — in parallelo alla linea compenso</div>
          <div style={{fontSize:'.68rem',marginTop:2}}>Q progetto aspirafango: {dc.aspFango.q} m³/h (in parallelo a compenso) · v={dc.aspFango.v} m/s (limite: {dc.aspFango.vmAF} m/s — uso temporaneo presidiato) {dc.aspFango.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">v fuori limite</span>}</div>
          {dc.aspFango.warns.length>0&&dc.aspFango.warns.map((w,i)=><div key={i} style={{fontSize:'.62rem',color:'var(--rd)',marginTop:2}}>⚠ {w}</div>)}
          <div style={{fontSize:'.6rem',color:'#888',marginTop:3}}>Condizione di esercizio alternativa: pulizia fondo senza bagnanti in vasca. La pompa aspira da compenso + aspirafango in parallelo.</div>
        </div>}
      </div>)}
    </div></div>

    {d.circ!=='skimmer'&&dc.aspCompenso&&<div className="ex"><div className="ex-h" style={{background:'#a07030'}}>ASPIRAZIONE DALLA VASCA DI COMPENSO</div><div className="ex-b">
      <div className="dl"><b>Linea in aspirazione</b> — dalla vasca di compenso al collettore aspirazione nel locale tecnico</div>
      <div className="dl">Q superficie: <b>{dc.aspCompenso.q} m³/h</b> ({d.tipoPisc==='Tipo 2'?'75%':'67%'} della portata totale)</div>
      <div className="pr"><span className="dn dn-a">D.{dc.aspCompenso.dn.dn}</span> J={dc.aspCompenso.dn.j} mm/m · v={dc.aspCompenso.dn.v} m/s
        {dc.aspCompenso.dn.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>}{dc.aspCompenso.dn.vWarn&&dc.aspCompenso.dn.ok&&<span className="bg" style={{background:'#fef3cd',color:'#856404',marginLeft:4}}>BP</span>}</div>
      <div style={{fontSize:'.6rem',color:'#888',marginTop:3}}>Circuito in aspirazione (la pompa crea depressione e richiama l'acqua dal compenso). Verificare NPSH: la pompa deve essere sotto il livello minimo dell'acqua nel compenso.</div>
    </div></div>}

    <div className="ex"><div className="ex-h" style={{background:dc.pf?(dc.pf.sicurezza.ok?'var(--gn)':'var(--rd)'):'#aaa'}}>{dc.pf?`PRESE DI FONDO — VERIFICA SICUREZZA (${d.tipoPisc==='Tipo 2'?'UNI EN 13451-3':'UNI EN 16582 / 16713'})`:'PRESE DI FONDO — ESCLUSE (scelta progettuale)'}</div><div className="ex-b">
      {!dc.pf?(<div>
        <div className="wr" style={{marginBottom:4}}>⚠ Prese di fondo NON presenti in questo progetto. Tutta l'aspirazione avviene dalla superficie ({d.circ==='skimmer'?'skimmer':'canaletta sfioro + vasca compenso'}).</div>
        <div style={{fontSize:'.7rem',color:'#555'}}>Nessuna linea PF · Nessun componente · Nessuna verifica sicurezza aspirazioni sommerse</div>
        <div style={{fontSize:'.62rem',color:'#888',marginTop:4}}>La scelta di escludere le prese di fondo è consentita per scelta progettuale. Assicurarsi che lo schema idraulico e il contratto con il cliente lo prevedano esplicitamente.</div>
      </div>):(
      <div>
      <div className="dl"><b>{dc.pf.n} prese di fondo</b> in parallelo (interasse {dc.pf.dist}, distanza pareti {dc.pf.distPareti})</div>
      <div style={{background:'#f5f0e8',borderRadius:6,padding:8,margin:'6px 0',fontSize:'.72rem'}}>
        <div style={{fontWeight:700,marginBottom:4}}>Condizione di ESERCIZIO (nominale):</div>
        <div className="dl">Q fondo nominale: <b>{dc.pf.qNom} m³/h</b> ({d.tipoPisc==='Tipo 2'?'25%':'33%'} di Q totale)</div>
        <div className="dl">Q per presa (esercizio): <b>{dc.pf.qNomEa} m³/h</b></div>
      </div>
      <div style={{background:dc.pf.sicurezza.ok?'#eafaf1':'#fdf2f0',borderRadius:6,padding:8,margin:'6px 0',fontSize:'.72rem',borderLeft:'3px solid '+(dc.pf.sicurezza.ok?'var(--gn)':'var(--rd)')}}>
        <div style={{fontWeight:700,marginBottom:4,color:dc.pf.sicurezza.ok?'var(--gn)':'var(--rd)'}}>Condizione di SICUREZZA (caso peggiore — {d.tipoPisc==='Tipo 2'?'UNI EN 13451-3:2022':'UNI EN 16582 + rif. EN 13451-3'}):</div>
        <div className="dl">Q verifica = Q pompa totale: <b>{dc.pf.qVerifica} m³/h</b></div>
        <div className="dl" style={{fontSize:'.68rem',color:'#888'}}>Scenario: tutte le altre aspirazioni chiuse, tutta la portata passa dalle prese fondo</div>
        <div className="dl">Con 1 presa ostruita → {dc.pf.sicurezza.nAttive} prese attive: <b>Q per presa = {dc.pf.sicurezza.qPerPresa} m³/h</b></div>
        <div className="dl">Q max griglia (certificata costruttore, v ≤ 0,5 m/s): <b>{dc.pf.qMaxGriglia} m³/h</b></div>
        {dc.pf.sicurezza.ok?
          <div style={{color:'var(--gn)',fontWeight:700,marginTop:4}}>✓ {dc.pf.sicurezza.qPerPresa} m³/h ≤ {dc.pf.qMaxGriglia} m³/h — CONFORME</div>:
          <div style={{color:'var(--rd)',fontWeight:700,marginTop:4}}>❌ {dc.pf.sicurezza.qPerPresa} m³/h > {dc.pf.qMaxGriglia} m³/h — NON CONFORME</div>
        }
        {dc.pf.sicurezza.err.map((e,i)=><div key={i} className="wr" style={{margin:'3px 0'}}>{e}</div>)}
        {dc.pf.sicurezza.warn.map((w,i)=><div key={i} style={{color:'var(--or)',fontSize:'.7rem',margin:'2px 0'}}>⚠ {w}</div>)}
      </div>
      <div className="pr"><span className="dn dn-a">D.{dc.pf.dnLinea.dn}</span> Tubazione prese → LT verificata a Q pompa = {dc.pf.qVerifica} m³/h · J={dc.pf.dnLinea.j} mm/m · v={dc.pf.dnLinea.v} m/s
        {dc.pf.dnLinea.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>}{dc.pf.dnLinea.vWarn&&dc.pf.dnLinea.ok&&<span className="bg" style={{background:'#fef3cd',color:'#856404',marginLeft:4}}>BP</span>}</div>
      <div style={{fontSize:'.64rem',color:'var(--bl)',marginTop:3}}>
        Nota: il D. della tubazione è dimensionato alla portata totale della pompa (non alla quota fondo nominale) perché nello schema con collettore unico e valvole manuali è tecnicamente possibile che tutta la portata transiti dalla linea prese fondo.
      </div>
      </div>)}
    </div></div>

    <div className="ex"><div className="ex-h" style={{background:'var(--c1)'}}>COLLETTORE ASPIRAZIONE (unico — locale tecnico){dc.collAsp.dn.ovr?' ⚙ OVERRIDE':''}</div><div className="ex-b">
      <div className="dl">Q tot: <b className="tc">{dc.collAsp.qTot} m³/h</b> · {dc.collAsp.nLinee} linee con valvola individuale</div>
      <div className="pr"><span className="dn dn-c">D.{dc.collAsp.dn.dn}</span>{dc.collAsp.dn.ovr&&<span className="bg" style={{background:'#fff3cd',color:'#856404',marginLeft:4}}>⚙ override</span>} v={dc.collAsp.dn.v} m/s (max {d.tipoPisc==='Tipo 2'?PR.V_CA_T2:PR.V_CA_DOM}) · Sez. {dc.collAsp.dn.rap}× ramo (min {d.tipoPisc==='Tipo 2'?PR.R_C_T2:PR.R_C_DOM}×)
        {dc.collAsp.dn.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>}</div>
    </div></div>

    <div className="ex"><div className="ex-h" style={{background:'#7f8c8d'}}>TRATTI LOCALE TECNICO (PN10)</div><div className="ex-b">
      <div className="dl" style={{marginBottom:4}}><b>C1</b> — Coll.asp → Pompa</div>
      <div className="pr"><span className="dn dn-a">D.{dc.trC1?dc.trC1.dn:dc.trPompa.dn}</span> Q={Qtot.toFixed(1)} m³/h{dc.trC1&&dc.trC1.v?' · v='+dc.trC1.v+' m/s':''}
        {dc.trC1?(dc.trC1.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>):null}</div>
      <div className="dl" style={{marginBottom:4,marginTop:6}}><b>C2</b> — Pompa → Filtro</div>
      <div className="pr"><span className="dn dn-a">D.{dc.trC2?dc.trC2.dn:dc.trPompa.dn}</span> Q={Qtot.toFixed(1)} m³/h{dc.trC2&&dc.trC2.v?' · v='+dc.trC2.v+' m/s':''}
        {dc.trC2?(dc.trC2.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>):null}</div>
      <div className="dl" style={{marginBottom:4,marginTop:6}}><b>C3</b> — Filtro → Coll.man</div>
      <div className="pr"><span className="dn dn-a">D.{dc.trC3?dc.trC3.dn:dc.trPompa.dn}</span> Q={Qtot.toFixed(1)} m³/h{dc.trC3&&dc.trC3.v?' · v='+dc.trC3.v+' m/s':''}
        {dc.trC3?(dc.trC3.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>):null}</div>
    </div></div>

    <div className="ex"><div className="ex-h" style={{background:'var(--bl)'}}>COLLETTORE MANDATA (unico — locale tecnico){dc.collMan.dn.ovr?' ⚙ OVERRIDE':''}</div><div className="ex-b">
      <div className="dl">Q tot: <b className="tc">{dc.collMan.qTot} m³/h</b> · {dc.collMan.nLinee} derivazioni con valvola/sfera</div>
      <div className="pr"><span className="dn dn-c">D.{dc.collMan.dn.dn}</span>{dc.collMan.dn.ovr&&<span className="bg" style={{background:'#fff3cd',color:'#856404',marginLeft:4}}>⚙ override</span>} v={dc.collMan.dn.v} m/s (max {d.tipoPisc==='Tipo 2'?PR.V_CM_T2:PR.V_CM_DOM}) · Sez. {dc.collMan.dn.rap}× ramo (min {d.tipoPisc==='Tipo 2'?PR.R_C_T2:PR.R_C_DOM}×)
        {dc.collMan.dn.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>}</div>
    </div></div>

    <div className="ex"><div className="ex-h" style={{background:'var(--or)'}}>BOCCHETTE IMMISSIONE ({d.circ==='skimmer'?'a parete':'parete/pavimento'})</div><div className="ex-b">
      <div className="dl"><b>{dc.bocc.n} bocchette</b> · Q cad: {dc.bocc.qEa} m³/h (max 5 m³/h con sfera)</div>
      <div className="pr"><span className="dn dn-a">D.{dc.bocc.dnRamo.dn}</span> Ogni linea con valvola/sfera · J={dc.bocc.dnRamo.j} mm/m · v={dc.bocc.dnRamo.v} m/s
        {dc.bocc.dnRamo.ok?<span className="bg bg-ok">OK</span>:<span className="bg bg-no">⚠</span>}{dc.bocc.dnRamo.vWarn&&dc.bocc.dnRamo.ok&&<span className="bg" style={{background:'#fef3cd',color:'#856404',marginLeft:4}}>BP</span>}</div>
      <div className="inf" style={{marginTop:4}}>Schema a collettore unico con derivazioni individuali. Regolare le sfere in fase di avviamento per uniformare i getti.</div>
    </div></div>

    <div className="nb"><b>Riepilogo:</b><br/>
      {d.circ==='skimmer'?'• Skimmer: '+dc.ski.n:'• Pilette scarico D.'+dc.sfi.dnPil+': '+dc.sfi.n+' · Collettore scarico D.'+dc.sfi.collScar.dn}<br/>
      {d.circ!=='skimmer'&&dc.aspCompenso&&<span>• Aspirazione compenso: D.{dc.aspCompenso.dn.dn} ({dc.aspCompenso.q} m³/h)<br/></span>}
      {d.circ!=='skimmer'&&dc.aspFango&&<span>• Aspirafango: D.{dc.aspFango.dn.dn} (parallelo a compenso)<br/></span>}
      {dc.pf?<span>• Prese fondo: {dc.pf.n} (parallelo, 1 linea al LT)<br/></span>:<span>• Prese di fondo: ESCLUSE<br/></span>}
      • Bocchette: {dc.bocc.n}<br/>
      • Coll. asp: D.{dc.collAsp.dn.dn} · Coll. man: D.{dc.collMan.dn.dn}
    </div>
  </div>

    <button className="bn bn-bk" onClick={bk}>← 4. Idraulica</button>
    <button className="bn" style={{background:'#1A5057',color:'#fff',borderColor:'#1A5057',fontWeight:700}} onClick={saveProject}>💾 Salva progetto</button>
    <label style={{cursor:'pointer'}}>
      <span className="bn" style={{background:'#2E7D7D',color:'#fff',borderColor:'#2E7D7D',fontWeight:700,display:'inline-block'}}>📂 Carica progetto</span>
      <input type="file" accept=".json" style={{display:'none'}} onChange={function(e){
        var file=e.target.files[0];if(!file)return;
        var reader=new FileReader();
        reader.onload=function(ev){
          try{var data=JSON.parse(ev.target.result);
            if(!data._version||data._version.indexOf('acqualab')<0){alert('File non riconosciuto.');return;}
            setD(data.d);setFase(0);alert('Progetto "'+( data._cliente||'')+'" caricato.');
          }catch(err){alert('Errore: '+err.message);}
        };reader.readAsText(file);e.target.value='';
      }}/>
    </label>
  </div>
  </F>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
